    // --- Flight pricing (per-destination, mean-reverting daily walk) ---
    // Inspired by the "FILM MASTER" prototype where each city has its own
    // daily flight price. Here it's a soft mean-reverting walk per city so
    // a player who watches the prices can time a cheap flight.
    const FLIGHT_BASE = {
      telaviv: 160,
      athens:  140,
      berlin:  200,
      london:  260,
      nyc:     380,
      paris:   220
    };

    function ensureFlightIndex() {
      if (!gameState.flightIndex || typeof gameState.flightIndex !== "object") {
        gameState.flightIndex = {};
      }
      Object.keys(FLIGHT_BASE).forEach((c) => {
        if (typeof gameState.flightIndex[c] !== "number") {
          gameState.flightIndex[c] = 0.9 + rand() * 0.2;
        }
      });
    }

    function tickFlights() {
      ensureFlightIndex();
      Object.keys(gameState.flightIndex).forEach((c) => {
        const cur = gameState.flightIndex[c];
        const drift = (1 - cur) * 0.22;
        const noise = (rand() - 0.5) * 0.22;
        gameState.flightIndex[c] = clamp(cur + drift + noise, 0.55, 1.7);
      });
    }

    function flightCost(destCityId) {
      ensureFlightIndex();
      const base = FLIGHT_BASE[destCityId] || 180;
      const idx = gameState.flightIndex[destCityId] || 1;
      return Math.round(base * idx * priceScale());
    }

    // --- Stock market (4 instruments, daily walk, buy/sell) ---
    // Fictional brands — stylized clones, no real trademarks
    const STOCK_DEFS = [
      { ticker: "A26",  initial: 380,   vol: 0.055, name: { he: "א.26",       en: "A26" } },
      { ticker: "NTFK", initial: 480,   vol: 0.045, name: { he: "נטפליק",     en: "Netfleek" } },
      { ticker: "PRMX", initial: 14,    vol: 0.07,  name: { he: "פראמקס",    en: "Paramax" } },
      { ticker: "KOIN", initial: 60000, vol: 0.11,  name: { he: "קוין-קוין",   en: "KoinKoin" } }
    ];

    function ensureStocks() {
      if (!gameState.stocks || typeof gameState.stocks !== "object") {
        gameState.stocks = {};
      }
      if (!gameState.holdings || typeof gameState.holdings !== "object") {
        gameState.holdings = {};
      }
      STOCK_DEFS.forEach((def) => {
        if (!gameState.stocks[def.ticker]) {
          gameState.stocks[def.ticker] = { price: def.initial, lastPrice: def.initial };
        }
        if (typeof gameState.holdings[def.ticker] !== "number") {
          gameState.holdings[def.ticker] = 0;
        }
      });
    }

    function tickStocks() {
      ensureStocks();
      STOCK_DEFS.forEach((def) => {
        const s = gameState.stocks[def.ticker];
        if (!s) return;
        s.lastPrice = s.price;
        const meanRevert = (def.initial - s.price) / def.initial * 0.06;
        const noise = (rand() - 0.5) * 2 * def.vol;
        const next = s.price * (1 + meanRevert + noise);
        s.price = Math.max(def.initial * 0.1, Math.round(next * 100) / 100);
      });
    }

    function buyStock(ticker, qty) {
      ensureStocks();
      const s = gameState.stocks[ticker];
      if (!s) return false;
      qty = Math.max(1, Math.floor(qty || 1));
      const cost = Math.round(s.price * qty);
      if (gameState.cash < cost) {
        flashMessage(localize({ he: "אין מספיק מזומן", en: "Not enough cash" }), "bad");
        return false;
      }
      changeCash(-cost);
      gameState.holdings[ticker] = (gameState.holdings[ticker] || 0) + qty;
      playSfx("cash");
      saveGame();
      return true;
    }

    function sellStock(ticker, qty) {
      ensureStocks();
      const s = gameState.stocks[ticker];
      if (!s) return false;
      qty = Math.max(1, Math.floor(qty || 1));
      const have = gameState.holdings[ticker] || 0;
      if (have < qty) {
        flashMessage(localize({ he: "אין מספיק יחידות למכור", en: "Not enough units to sell" }), "bad");
        return false;
      }
      const revenue = Math.round(s.price * qty);
      changeCash(revenue);
      gameState.holdings[ticker] = have - qty;
      playSfx("cash");
      saveGame();
      return true;
    }

    function tickModifiers() {
      if (!Array.isArray(gameState.activeModifiers) || !gameState.activeModifiers.length) {
        return;
      }
      const next = [];
      for (let i = 0; i < gameState.activeModifiers.length; i += 1) {
        const m = gameState.activeModifiers[i];
        const daysLeft = m.daysLeft - 1;
        if (daysLeft > 0) {
          next.push(Object.assign({}, m, { daysLeft }));
        }
      }
      gameState.activeModifiers = next;
    }

    function formatMoney(value) {
      const rounded = Math.round(value);
      if (gameState.language === "he") {
        return (rounded < 0 ? "-" : "") + Math.abs(rounded) + " ₪";
      }
      return (rounded < 0 ? "-$" + Math.abs(rounded) : "$" + rounded);
    }

    function formatHour(hour) {
      return String(hour).padStart(2, "0") + ":00";
    }

    function formatDuration(hours) {
      return gameState.language === "he" ? hours + "ש" : hours + "h";
    }

    function visibleBuildings(city = getCity()) {
      return (city.buildings || []).filter((buildingId) => buildingId !== "airport");
    }

    function normalizeCurrentBuilding() {
      const currentCity = getCity();
      const available = visibleBuildings(currentCity);
      if (!available.includes(gameState.currentBuilding)) {
        gameState.currentBuilding = available[0] || "home";
      }
    }

    function equipmentBenefits() {
      const benefits = {
        shootDiscount: 0,
        postDiscount: 0,
        buzzBoost: 0,
        qualityBoost: 0,
        releaseBoost: 0
      };
      if (gameState.equipment.camera) {
        benefits.shootDiscount += 0.08;
        benefits.buzzBoost += 0.04;
        benefits.qualityBoost += 0.03;
      }
      if (gameState.equipment.studio) {
        benefits.postDiscount += 0.3;
        benefits.buzzBoost += 0.09;
        benefits.releaseBoost += 0.04;
      }
      if (gameState.equipment.insurance) {
        benefits.shootDiscount += 0.12;
        benefits.postDiscount += 0.08;
        benefits.buzzBoost += 0.06;
        benefits.qualityBoost += 0.04;
      }
      return benefits;
    }

    function shootCost(baseCost) {
      return Math.round(baseCost * priceScale() * (1 - equipmentBenefits().shootDiscount));
    }

    function postCost(baseCost = 920) {
      return Math.round(baseCost * priceScale() * (1 - equipmentBenefits().postDiscount));
    }

    function statusRowMarkup(label, value, tone) {
      return `
        <div class="ledger-row ${tone || ""}">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `;
    }

    function scoreWealth() {
      return Math.round(gameState.cash + gameState.bank + gameState.fund - gameState.debt);
    }

    function scoreCareer() {
      return Math.round(gameState.reputation + gameState.projects.filter((p) => p.released).length * 15 + gameState.jobTier * 12);
    }

    function scoreEducation() {
      return gameState.education;
    }

    function scoreHappiness() {
      return Math.round((gameState.soul + gameState.creativity + gameState.love) / 3);
    }

    function goalValue(category) {
      if (category === "wealth") return scoreWealth();
      if (category === "career") return scoreCareer();
      if (category === "education") return scoreEducation();
      return scoreHappiness();
    }

    function goalTarget(category) {
      const base = GOAL_TARGETS[category][gameState.goalLevels[category]];
      // Happiness is a bounded quality-of-life stat, not time-accumulated — keep it fixed.
      // Accumulative goals scale closer in shorter seasons (the other half of the pacing).
      if (category === "happiness") {
        return base;
      }
      const eased = base / paceScale();
      return category === "education" ? Math.max(1, Math.round(eased)) : Math.round(eased);
    }

    function goalProgress(category) {
      return clamp(Math.round((goalValue(category) / goalTarget(category)) * 100), 0, 100);
    }

    function allGoalsMet() {
      return ["wealth", "career", "education", "happiness"].every((category) => goalProgress(category) >= 100);
    }

    function projectSlotLimit() {
      if (!gameState.filmUnlocked) {
        return 0;
      }
      return 2 + (gameState.reputation >= 80 ? 1 : 0);
    }

    function activeProjects() {
      return gameState.projects.filter((project) => !project.archived).length;
    }

    function getFocusedProject() {
      return gameState.projects.find((project) => project.id === gameState.focusedProjectId) || null;
    }

    function setFocusedProject(projectId) {
      gameState.focusedProjectId = projectId;
      render();
      return true;
    }

    function adjustStat(key, delta) {
      const bounds = key === "reputation" || key === "education" ? [0, 999] : [0, 100];
      gameState[key] = clamp(gameState[key] + delta, bounds[0], bounds[1]);
      return gameState[key];
    }

    function changeCash(delta) {
      gameState.cash = Math.round(gameState.cash + delta);
      return gameState.cash;
    }

    function note(copy, tone = "neutral") {
      gameState.ticker = copy;
      gameState.log.unshift({ copy, tone, day: gameState.day, hour: gameState.hour });
      gameState.log = gameState.log.slice(0, 18);
      return copy;
    }

    function openNotice(copy, tone = "neutral", title) {
      gameState.activeNotice = {
        id: "n" + gameState.day + "-" + gameState.hour + "-" + Math.floor(rand() * 100000),
        title: title || (tone === "good" ? t("success") : tone === "bad" ? t("fail") : t("notice")),
        copy,
        tone
      };
      if (canRender && dom) {
        if (dom.noticeTimer) {
          root.clearTimeout(dom.noticeTimer);
          dom.noticeTimer = null;
        }
      }
    }

    function flashMessage(copy, tone = "neutral") {
      note(copy, tone);
      openNotice(copy, tone);
      render();
    }

    function playSfx(kind) {
      if (!canRender || gameState.muted) {
        return;
      }
      try {
        audioContext = audioContext || new (root.AudioContext || root.webkitAudioContext)();
      } catch (_err) {
        return;
      }
      const ctx = audioContext;
      const now = ctx.currentTime;
      const bank = {
        cash: [[420, 0.08], [620, 0.06]],
        success: [[520, 0.08], [760, 0.08], [920, 0.1]],
        fail: [[180, 0.08], [130, 0.12]],
        release: [[480, 0.09], [680, 0.08], [910, 0.15], [1180, 0.11]],
        danger: [[160, 0.16], [120, 0.18]],
        travel: [[360, 0.06], [420, 0.06]],
        sleep: [[260, 0.16]]
      };
      const notes = bank[kind] || bank.cash;
      notes.forEach((pair, index) => {
        const [freq, len] = pair;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = kind === "danger" ? "square" : kind === "release" ? "triangle" : "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, now + index * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.11, now + index * 0.08 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.08 + len);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + index * 0.08);
        osc.stop(now + index * 0.08 + len + 0.02);
      });
    }

    function ensureTime(hours) {
      return gameState.hour + hours <= 23;
    }

    function spendHours(hours, reason) {
      if (!ensureTime(hours)) {
        flashMessage(localize({
          he: "היום קצר מדי לזה. תישן/י קודם.",
          en: "The day is too short for that. Sleep first."
        }), "bad");
        return false;
      }
      gameState.hour += hours;
      if (reason) {
        note(reason);
      }
      return true;
    }

    function distanceBetween(city, fromId, toId) {
      const ring = visibleBuildings(city);
      const fromIndex = ring.indexOf(fromId);
      const toIndex = ring.indexOf(toId);
      if (fromIndex < 0 || toIndex < 0) {
        return 0;
      }
      const raw = Math.abs(fromIndex - toIndex);
      return Math.min(raw, ring.length - raw);
    }

    function goToBuilding(id) {
      const city = getCity();
      const ring = visibleBuildings(city);
      if (!ring.includes(id)) {
        flashMessage(localize({
          he: "הבניין לא בעיר הזו כרגע.",
          en: "That building is not in this city right now."
        }), "bad");
        return false;
      }
      const distance = distanceBetween(city, gameState.currentBuilding, id);
      if (distance > 0 && !spendHours(distance, t("travelCost", { hours: distance }))) {
        return false;
      }
      gameState.currentBuilding = id;
      gameState.travelFlash = true;
      playSfx(distance > 0 ? "travel" : "cash");
      render();
      root.setTimeout(() => {
        gameState.travelFlash = false;
        render();
      }, 900);
      return true;
    }

    function flyTo(cityId) {
      if (cityId === gameState.city) {
        return true;
      }
      const target = getCity(cityId);
      if (!target) {
        return false;
      }
      const cost = flightCost(cityId);
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק כסף לכרטיס. השמיים שמורים לעשירים ולמלווים בריבית.",
          en: "Not enough cash for a ticket. The skies belong to the rich and the predatory."
        }), "bad");
        return false;
      }
      if (!spendHours(3, t("flyCost", { hours: 3, cost }))) {
        return false;
      }
      changeCash(-cost);
      gameState.city = cityId;
      gameState.currentBuilding = visibleBuildings(target)[0] || "home";
      flashMessage(localize({
        he: "נחתת ב" + localize(target.name) + ".",
        en: "You landed in " + localize(target.name) + "."
      }), "good");
      playSfx("travel");
      updateDailySystems();
      render();
      return true;
    }

    function getJob(jobId) {
      return JOBS.find((job) => job.id === jobId) || null;
    }

    function applyJob(jobId) {
      const job = getJob(jobId);
      if (!job) {
        return false;
      }
      const missing =
        gameState.education < job.req.education ||
        gameState.wardrobeTier < job.req.wardrobe ||
        gameState.experience < job.req.experience ||
        gameState.reputation < job.req.reputation;
      if (missing) {
        flashMessage(localize(job.reject), "bad");
        playSfx("fail");
        spendHours(1, localize({
          he: "בזבזת שעה על טופס ודחייה מנומסת.",
          en: "You burned an hour on paperwork and polite rejection."
        }));
        render();
        return false;
      }
      if (!spendHours(1, localize({
        he: "ראיון קצר, מבט חודר, לחיצת יד מזיעה.",
        en: "Short interview, cold stare, sweaty handshake."
      }))) {
        return false;
      }
      gameState.jobId = job.id;
      gameState.jobTier = job.tier;
      adjustStat("reputation", 1);
      flashMessage(localize({
        he: "התקבלת: " + localize(job.title),
        en: "Hired: " + localize(job.title)
      }), "good");
      playSfx("success");
      updateUnlocks();
      saveGame();
      return true;
    }

    function degradeWardrobe(amount) {
      if (!gameState.wardrobeTier) {
        return;
      }
      gameState.wardrobeWear -= amount;
      if (gameState.wardrobeWear <= 0) {
        gameState.wardrobeTier = Math.max(0, gameState.wardrobeTier - 1);
        gameState.wardrobeWear = gameState.wardrobeTier ? 100 : 0;
        flashMessage(t("wardrobeWorn"), "bad");
      }
    }

    function workShift(hours = 4) {
      const job = getJob(gameState.jobId);
      if (!job) {
        flashMessage(localize({
          he: "צריך קודם עבודה. הקונספט של משכורת בנוי על זה.",
          en: "You need a job first. Salary depends on that concept."
        }), "bad");
        return false;
      }
      if (![4, 6, 8].includes(hours)) {
        hours = 4;
      }
      if (!spendHours(hours, t("workShift", { hours }))) {
        return false;
      }
      const pay = Math.round(job.wage * hours * economyProfile().wages * paceScale());
      changeCash(pay);
      gameState.experience += Math.round(job.exp * (hours / 4));
      adjustStat("reputation", job.rep);
      adjustStat("soul", hours >= 8 ? -3 : -1);
      adjustStat("creativity", -1);
      degradeWardrobe(hours * 6 + job.tier * 2);
      flashMessage(localize({
        he: "משמרת הסתיימה: +" + formatMoney(pay),
        en: "Shift complete: +" + formatMoney(pay)
      }), "good");
      playSfx("cash");
      updateUnlocks();
      saveGame();
      return true;
    }

    function switchHousing(housingId) {
      const item = HOUSING[housingId];
      if (!item) {
        return false;
      }
      if (housingId === gameState.housing) {
        return true;
      }
      if (housingId === "couch") {
        gameState.housing = "couch";
        flashMessage(localize({
          he: "חזרת לספה. היא לא התגעגעה.",
          en: "Back to the couch. It did not miss you."
        }), "bad");
        render();
        return true;
      }
      const entry = Math.round(item.rent * gameState.rentMultiplier);
      if (gameState.cash < entry) {
        flashMessage(localize({
          he: "אין לך מספיק בשביל שכר הדירה הראשון.",
          en: "You cannot cover the first rent."
        }), "bad");
        return false;
      }
      changeCash(-entry);
      gameState.housing = housingId;
      flashMessage(localize({
        he: "עברת ל" + localize(item.name) + ".",
        en: "Moved into " + localize(item.name) + "."
      }), "good");
      playSfx("success");
      saveGame();
      return true;
    }

    function buyWardrobe(tier) {
      const item = WARDROBES.find((entry) => entry.tier === Number(tier));
      if (!item) {
        return false;
      }
      if (gameState.housing === "couch" && item.tier > 1) {
        flashMessage(localize({
          he: "אין לך ארון. אי אפשר לנהל מלתחה מפוארת על יד כרית של מישהו אחר.",
          en: "You do not own a closet. Luxury wardrobe management from someone else's pillow is not viable."
        }), "bad");
        return false;
      }
      const cost = Math.round(item.price * priceScale());
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק כסף לבד שנראה אמין.",
          en: "Not enough cash for believable fabric."
        }), "bad");
        return false;
      }
      changeCash(-cost);
      gameState.wardrobeTier = item.tier;
      gameState.wardrobeWear = 100;
      flashMessage(localize({
        he: "המלתחה עלתה לדרגה " + item.tier + ".",
        en: "Wardrobe upgraded to tier " + item.tier + "."
      }), "good");
      playSfx("cash");
      saveGame();
      render();
      return true;
    }

    function attendClass(courseId = "night") {
      const course = COURSES.find((entry) => entry.id === courseId) || COURSES[0];
      const cost = Math.round(course.cost * priceScale() * modifierMultiplier("course"));
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "הקורס לא מקבל הבטחות עתידיות במקום כסף.",
          en: "The school does not accept future promises instead of money."
        }), "bad");
        return false;
      }
      if (!spendHours(course.hours, localize(course.name))) {
        return false;
      }
      changeCash(-cost);
      gameState.educationCredits += course.credits * paceScale() * modifierMultiplier("courseCredits");
      adjustStat("creativity", course.creativity);
      adjustStat("soul", course.soul);
      while (gameState.educationCredits >= (gameState.education + 1) * 2) {
        gameState.education += 1;
        adjustStat("reputation", 2);
        flashMessage(localize({
          he: "עלית ברמת ההשכלה. עכשיו אתה נשמע יקר יותר.",
          en: "Education level up. You now sound more expensive."
        }), "good");
      }
      playSfx("success");
      updateUnlocks();
      saveGame();
      return true;
    }

    function takeGig(gigId) {
      const gig = GIGS.find((entry) => entry.id === gigId);
      if (!gig) {
        return false;
      }
      const ledgerKey = gameState.day + ":" + gigId;
      if (gameState.dailyGigLedger[ledgerKey]) {
        flashMessage(localize({
          he: "את הגיג הזה כבר סחטת היום.",
          en: "You already squeezed that gig today."
        }), "bad");
        return false;
      }
      if (!spendHours(gig.hours, localize(gig.name))) {
        return false;
      }
      gameState.dailyGigLedger[ledgerKey] = true;
      changeCash(gig.pay);
      adjustStat("creativity", gig.creativity);
      adjustStat("soul", gig.soul);
      adjustStat("reputation", gig.rep);
      flashMessage(localize({
        he: "גיג נסגר: +" + formatMoney(gig.pay),
        en: "Gig closed: +" + formatMoney(gig.pay)
      }), "good");
      playSfx("cash");
      saveGame();
      return true;
    }

    // Phone-indie path: free, time-only, low chance to go viral.
    // Available from day 1. RNG payout gives the underdog narrative
    // (Sean Baker on iPhone, Tangerine vibes) without breaking economy.
    function shootOnPhone(originId) {
      const hours = originId === "cinematheque" ? 3 : 4;
      const viralChance = originId === "cinematheque" ? 0.07 : 0.05;
      const ledgerKey = gameState.day + ":phone:" + originId;
      if (!gameState.dailyGigLedger) gameState.dailyGigLedger = {};
      if (gameState.dailyGigLedger[ledgerKey]) {
        flashMessage(localize({
          he: "כבר צילמת בטלפון היום. תן לקליפ לנשום.",
          en: "Already shot a phone clip today. Let it breathe."
        }), "bad");
        return false;
      }
      if (!spendHours(hours, localize({ he: "צילום בטלפון", en: "Phone shoot" }))) {
        return false;
      }
      gameState.dailyGigLedger[ledgerKey] = true;
      const rng = (typeof Math.random === "function") ? Math.random() : 0;
      const wentViral = rng < viralChance;
      if (wentViral) {
        const cashGain = 240 + Math.round(rng * 9999) % 360;
        changeCash(cashGain);
        adjustStat("reputation", 2);
        adjustStat("happiness", 2);
        adjustStat("creativity", 1);
        flashMessage(localize({
          he: "ויראלי! הקליפ עף. +" + formatMoney(cashGain) + " וטיק שמים את השם שלך בפה.",
          en: "Viral! Clip is flying. +" + formatMoney(cashGain) + " and the algorithm whispers your name."
        }), "good");
        playSfx("cash");
      } else {
        adjustStat("creativity", 1);
        adjustStat("soul", 1);
        flashMessage(localize({
          he: "לא ויראלי, אבל היה כיף. +1 יצירתיות.",
          en: "Not viral, but it was fun. +1 creativity."
        }), "neutral");
      }
      saveGame();
      return true;
    }

    function buyEquip(name) {
      const prices = {
        camera: 1700,
        studio: 3600,
        insurance: 1450
      };
      if (!(name in prices)) {
        return false;
      }
      const cost = Math.round(prices[name] * priceScale() * modifierMultiplier("gear"));
      if (gameState.equipment[name]) {
        flashMessage(localize({
          he: "כבר קנית את זה. ציוד כפול זה פשוט חרדה בקופסה.",
          en: "You already bought that. Duplicate gear is just boxed anxiety."
        }), "bad");
        return false;
      }
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק מזומן לציוד הזה.",
          en: "Not enough cash for that gear."
        }), "bad");
        return false;
      }
      changeCash(-cost);
      gameState.equipment[name] = true;
      adjustStat("reputation", name === "camera" ? 1 : 2);
      flashMessage(localize({
        he: "רכשת " + (name === "camera" ? "מצלמת כתף" : name === "studio" ? "עמדת עריכה" : "קיט סאונד ותאורה"),
        en: "Purchased " + (name === "camera" ? "camera" : name === "studio" ? "editing workstation" : "sound and light kit")
      }), "good");
      playSfx("cash");
      updateUnlocks();
      saveGame();
      return true;
    }

    function doSoftAction(actionId) {
      const action = SOFT_ACTIONS[actionId];
      if (!action) {
        return false;
      }
      if (gameState.cash < action.cost) {
        flashMessage(localize({
          he: "אין מספיק מזומן לפינוק הזה כרגע.",
          en: "Not enough cash for that indulgence right now."
        }), "bad");
        return false;
      }
      if (!spendHours(action.hours, localize(action.name))) {
        return false;
      }
      changeCash(-action.cost);
      Object.keys(action.effects).forEach((stat) => {
        adjustStat(stat, action.effects[stat]);
      });
      flashMessage(localize(action.result), "good");
      playSfx("success");
      saveGame();
      return true;
    }

    function updateUnlocks() {
      if (!gameState.filmUnlocked &&
        gameState.experience >= 62 &&
        gameState.education >= 1 &&
        gameState.cash >= 300 &&
        gameState.equipment.camera) {
        gameState.filmUnlocked = true;
        flashMessage(t("filmUnlocked"), "good");
        playSfx("release");
      }
      return gameState.filmUnlocked;
    }

    function generateProjectTitle() {
      const first = pick(TITLE_BITS[gameState.language].first) || TITLE_BITS.he.first[0];
      const second = pick(TITLE_BITS[gameState.language].second) || TITLE_BITS.he.second[0];
      return first + " " + second;
    }

    function projectByIndex(index) {
      if (typeof index === "number") {
        return gameState.projects[index] || null;
      }
      return getFocusedProject();
    }

    function openOfferDeck(kind) {
      const focusedProject = getFocusedProject();
      if (kind !== "script" && !focusedProject) {
        flashMessage(t("needProject"), "bad");
        return false;
      }
      if (kind === "script" && !gameState.filmUnlocked) {
        flashMessage(t("filmLocked"), "bad");
        return false;
      }
      const offers = [];
      if (kind === "script") {
        for (let i = 0; i < 3; i += 1) {
          const genre = GENRES[Math.floor(rand() * GENRES.length)];
          const price = Math.round((620 + rand() * 980) * priceScale());
          offers.push({
            uid: "script-" + gameState.day + "-" + i,
            kind,
            name: generateProjectTitle(),
            genre: genre.id,
            label: localize(genre.name),
            price,
            floor: Math.round(price * (0.62 + rand() * 0.3)),
            copy: localize({
              he: "תסריט " + localize(genre.name) + " עם ריח של סיכון מבוקר.",
              en: localize(genre.name) + " script with the smell of curated risk."
            })
          });
        }
      } else {
        const names = kind === "cast"
          ? [{ he: "נועה עיניים-קשות", en: "Noa Hard-Eyes" }, { he: "בן כריזמה-בהשכרה", en: "Ben Rental-Charisma" }, { he: "מאיה בלי-בושה", en: "Maya No-Shame" }]
          : [{ he: "צוות לילה עם תיקים", en: "Night Crew with Cases" }, { he: "יחידת קפה אגרסיבית", en: "Aggressive Coffee Unit" }, { he: "חבילת מקצוענים שקטים", en: "Package of Quiet Pros" }];
        for (let i = 0; i < 3; i += 1) {
          const base = kind === "cast" ? 420 : 360;
          const spread = kind === "cast" ? 820 : 720;
          const price = Math.round((base + rand() * spread) * priceScale());
          offers.push({
            uid: kind + "-" + gameState.day + "-" + i,
            kind,
            name: localize(names[i % names.length]),
            price,
            floor: Math.round(price * (0.68 + rand() * 0.22)),
            quality: 0.8 + rand() * 0.55,
            copy: localize({
              he: kind === "cast" ? "הפנים ישדרו כאב, גם אם הטקסט חלש." : "הם שקטים, יקרים ויודעים להעמיד כבל בלי דרמה.",
              en: kind === "cast" ? "The face will carry pain even if the text cannot." : "They are quiet, expensive, and know how to place a cable without drama."
            })
          });
        }
      }
      gameState.offers = offers;
      render();
      return true;
    }

    function commitOffer(offer, agreedPrice) {
      if (offer.kind === "script") {
        if (activeProjects() >= projectSlotLimit()) {
          flashMessage(localize({
            he: "כל סלוטי ההפקה מלאים. תסיים משהו לפני עוד פאניקה.",
            en: "All production slots are full. Finish something before buying more panic."
          }), "bad");
          return false;
        }
        if (gameState.cash < agreedPrice) {
          flashMessage(localize({
            he: "אין מספיק מזומן לתסריט הזה.",
            en: "Not enough cash for that script."
          }), "bad");
          return false;
        }
        if (!spendHours(2, localize({
          he: "סגרת תסריט, חיבקת מסמך והעמדת פנים שאתה רגוע.",
          en: "You closed a script, hugged a document, and pretended to be calm."
        }))) {
          return false;
        }
        changeCash(-agreedPrice);
        const project = {
          id: "p" + (Date.now ? Date.now() : Math.floor(rand() * 100000)),
          title: offer.name,
          genre: offer.genre,
          stage: "script",
          cast: [],
          crew: [],
          shoots: 0,
          budgetTier: null,
          buzz: 0,
          reviewed: null,
          premiered: false,
          released: false,
          createdDay: gameState.day,
          fundGrant: 0,
          fundRecoup: 0,
          finishGrant: 0,
          investorCut: 0,
          scriptCost: agreedPrice,
          qualityBoost: 0
        };
        gameState.projects.push(project);
        gameState.focusedProjectId = project.id;
        flashMessage(localize({
          he: "נפתח פרויקט חדש: " + project.title,
          en: "New project opened: " + project.title
        }), "good");
        playSfx("success");
      } else {
        const project = getFocusedProject();
        if (!project) {
          return false;
        }
        if (gameState.cash < agreedPrice) {
          flashMessage(localize({
            he: "אין מספיק מזומן לסגור את זה.",
            en: "Not enough cash to close that deal."
          }), "bad");
          return false;
        }
        if (!spendHours(2, localize({
          he: "סגרת חוזה עם חיוך שנשמע יקר.",
          en: "You closed a deal with an expensive sounding smile."
        }))) {
          return false;
        }
        changeCash(-agreedPrice);
        if (offer.kind === "cast") {
          if (project.cast.length >= 2) {
            flashMessage(localize({
              he: "לפרויקט כבר יש שני שחקנים. זאת כבר קבוצה.",
              en: "The project already has two cast members. That is a team now."
            }), "bad");
            return false;
          }
          project.cast.push({ name: offer.name, quality: offer.quality, price: agreedPrice });
        } else {
          if (project.crew.length >= 3) {
            flashMessage(localize({
              he: "לפרויקט כבר יש שלושה אנשי צוות. זה מספיק כאב ניהולי.",
              en: "The project already has three crew hires. That is enough managerial pain."
            }), "bad");
            return false;
          }
          project.crew.push({ name: offer.name, quality: offer.quality, price: agreedPrice });
        }
        project.qualityBoost += offer.quality * 0.08;
        flashMessage(localize({
          he: "הצטרף/ה לפרויקט: " + offer.name,
          en: "Joined the project: " + offer.name
        }), "good");
        playSfx("cash");
      }
      gameState.offers = gameState.offers.filter((entry) => entry.uid !== offer.uid);
      saveGame();
      updateUnlocks();
      return true;
    }

    function buyScript(index = 0) {
      if (!gameState.offers.length || gameState.offers[0].kind !== "script") {
        openOfferDeck("script");
      }
      const offer = gameState.offers[index];
      if (!offer) {
        return false;
      }
      return commitOffer(offer, offer.price);
    }

    function hire(kind = "cast", index = 0) {
      if (!gameState.offers.length || gameState.offers[0].kind !== kind) {
        openOfferDeck(kind);
      }
      const offer = gameState.offers[index];
      if (!offer) {
        return false;
      }
      return commitOffer(offer, offer.price);
    }

    function haggle(index, optionIndex) {
      const offer = gameState.offers[index];
      if (!offer) {
        return false;
      }
      const discounts = [0.1, 0.25, 0.4];
      const discount = discounts[optionIndex] || 0.1;
      const ask = Math.round(offer.price * (1 - discount));
      if (!spendHours(1, localize({
        he: "התמקחת עם פרצוף של תקציב מתפורר.",
        en: "You haggled with the face of a collapsing budget."
      }))) {
        return false;
      }
      if (ask >= offer.floor) {
        flashMessage(localize({
          he: "הספק נאנח והסכים ל" + formatMoney(ask),
          en: "The vendor sighed and accepted " + formatMoney(ask)
        }), "good");
        playSfx("success");
        return commitOffer(offer, ask);
      }
      gameState.walkaways[offer.uid] = true;
      gameState.offers.splice(index, 1);
      flashMessage(localize({
        he: "הספק נעלב, אסף את כבודו ויצא.",
        en: "The vendor took offense, gathered their dignity, and left."
      }), "bad");
      playSfx("fail");
      saveGame();
      render();
      return false;
    }

    function canShoot(project) {
      return project && project.cast.length >= 2 && project.crew.length >= 3;
    }

    function doShoot(index, tier = "lean") {
      const project = projectByIndex(index);
      const shootTier = SHOOT_TIERS[tier] || SHOOT_TIERS.lean;
      if (!project) {
        flashMessage(t("needProject"), "bad");
        return false;
      }
      if (!canShoot(project)) {
        flashMessage(localize({
          he: "צריך 2 שחקנים ו-3 אנשי צוות לפני הצילומים.",
          en: "You need 2 cast hires and 3 crew hires before shooting."
        }), "bad");
        return false;
      }
      const cost = shootCost(shootTier.cost);
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק כסף ליום צילום כזה.",
          en: "Not enough cash for that shoot day."
        }), "bad");
        return false;
      }
      if (!spendHours(6, localize({
        he: "יום צילום " + localize(shootTier.name),
        en: localize(shootTier.name) + " shoot day"
      }))) {
        return false;
      }
      changeCash(-cost);
      project.shoots += 1;
      project.budgetTier = tier;
      project.stage = project.shoots >= 2 ? "shot" : "shooting";
      project.qualityBoost += ({ lean: 0.04, bold: 0.08, decadent: 0.13 }[tier] || 0.04) + equipmentBenefits().qualityBoost;
      adjustStat("creativity", tier === "decadent" ? 3 : 2);
      adjustStat("soul", -2);
      flashMessage(localize({
        he: "הצילום התקדם. טייקים, עשן ולחץ.",
        en: "Shooting moved forward. Takes, fumes, and pressure."
      }), "good");
      playSfx("cash");
      saveGame();
      render();
      return true;
    }

    function calcBuzz(project) {
      const castQuality = project.cast.reduce((sum, entry) => sum + entry.quality, 0) * 0.16;
      const crewQuality = project.crew.reduce((sum, entry) => sum + entry.quality, 0) * 0.12;
      const educationBoost = gameState.education * 0.05;
      const repBoost = gameState.reputation * 0.006;
      const luck = (rand() - 0.4) * 1.5;
      return clamp(0.55 + luck + castQuality + crewQuality + educationBoost + repBoost + project.qualityBoost + equipmentBenefits().buzzBoost, 0.4, 2.3);
    }

    function doPost(index) {
      const project = projectByIndex(index);
      if (!project) {
        flashMessage(t("needProject"), "bad");
        return false;
      }
      if (project.shoots < 2) {
        flashMessage(localize({
          he: "צריך שני ימי צילום גמורים לפני פוסט.",
          en: "You need two completed shoot days before post."
        }), "bad");
        return false;
      }
      const cost = postCost(920);
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק כסף לעריכה וסאונד.",
          en: "Not enough cash for editing and sound."
        }), "bad");
        return false;
      }
      if (!spendHours(6, localize({
        he: "פוסט: מחברים כאוס למסך אחד",
        en: "Post: stitching chaos into one screen"
      }))) {
        return false;
      }
      changeCash(-cost);
      project.buzz = calcBuzz(project);
      project.stage = "post";
      adjustStat("creativity", 3);
      flashMessage(localize({
        he: "הבאזז הסמוי נקבע על " + project.buzz.toFixed(2),
        en: "Hidden buzz locked at " + project.buzz.toFixed(2)
      }), "good");
      playSfx("success");
      saveGame();
      render();
      return true;
    }

    function doFund(kind = "production") {
      const project = getFocusedProject();
      if (kind === "development") {
        if (gameState.day - (gameState.lastFundDevDay || -30) < 30) {
          flashMessage(localize({
            he: "מסלול הפיתוח הזה פתוח לך שוב בעוד כמה שבועות.",
            en: "This development track opens again for you in a few weeks."
          }), "bad");
          return false;
        }
        if (gameState.education < 1 && gameState.reputation < 4) {
          flashMessage(localize({
            he: "מסלול הפיתוח דורש קצת לימודים או קצת שם.",
            en: "The development track wants at least some schooling or some reputation."
          }), "bad");
          return false;
        }
        if (!spendHours(2, localize({
          he: "פגישת פיתוח בקרן",
          en: "Fund development meeting"
        }))) {
          return false;
        }
        const stipend = Math.round((320 + gameState.education * 90 + gameState.reputation * 35) * priceScale() * paceScale());
        gameState.lastFundDevDay = gameState.day;
        changeCash(stipend);
        adjustStat("creativity", 2);
        adjustStat("reputation", 2);
        flashMessage(localize({
          he: "קיבלת מענק פיתוח של " + formatMoney(stipend) + ".",
          en: "You received a development grant of " + formatMoney(stipend) + "."
        }), "good");
        playSfx("success");
        saveGame();
        return true;
      }

      if (!project) {
        flashMessage(t("needProject"), "bad");
        return false;
      }

      if (kind === "finishing") {
        if (!["shot", "post"].includes(project.stage)) {
          flashMessage(localize({
            he: "בקשת השלמה מתאימה רק לסרט שכבר צולם.",
            en: "A finishing grant only fits a film that already has footage."
          }), "bad");
          return false;
        }
        if (project.finishGrant > 0) {
          flashMessage(localize({
            he: "כבר קיבלת מענק השלמה על הפרויקט הזה.",
            en: "You already received a finishing grant for this project."
          }), "bad");
          return false;
        }
        if (gameState.reputation < 10) {
          flashMessage(localize({
            he: "הקרן רוצה לראות קצת יותר מוניטין לפני מענק השלמה.",
            en: "The fund wants a bit more reputation before a finishing grant."
          }), "bad");
          return false;
        }
        if (!spendHours(3, localize({
          he: "בקשת השלמה לקרן",
          en: "Finishing grant meeting"
        }))) {
          return false;
        }
        const finishGrant = Math.round((760 + gameState.reputation * 28) * priceScale());
        project.finishGrant = finishGrant;
        project.fundRecoup += Math.round(finishGrant * 0.4);
        project.qualityBoost += 0.05;
        changeCash(finishGrant);
        flashMessage(localize({
          he: "הקרן השלימה " + formatMoney(finishGrant) + " כדי לסגור את הפוסט.",
          en: "The fund added " + formatMoney(finishGrant) + " to help close post."
        }), "good");
        playSfx("success");
        saveGame();
        return true;
      }

      if (project.fundGrant > 0) {
        flashMessage(localize({
          he: "הקרן כבר בפנים. הם לא חותמים פעמיים על אותו חלום.",
          en: "The fund is already in. They do not sign the same dream twice."
        }), "bad");
        return false;
      }
      if (gameState.reputation < 6) {
        flashMessage(localize({
          he: "הלקטור חייך ואמר שצריך עוד קצת מוניטין לפני הגשה.",
          en: "The reader smiled and said you need a little more reputation before submitting."
        }), "bad");
        return false;
      }
      if (!spendHours(2, localize({
        he: "הגשת תיק לקרן",
        en: "Fund submission"
      }))) {
        return false;
      }
      const grant = Math.round((1200 + gameState.reputation * 40) * priceScale());
      project.fundGrant = grant;
      project.fundRecoup = grant;
      changeCash(grant);
      flashMessage(localize({
        he: "הקרן הזרימה " + formatMoney(grant) + " ותיקח 50% מההכנסות עד החזר.",
        en: "The fund wired " + formatMoney(grant) + " and will recoup 50% of revenues until paid back."
      }), "good");
      playSfx("success");
      saveGame();
      return true;
    }

    function doPinv(index) {
      const project = projectByIndex(index);
      if (!project) {
        flashMessage(t("needProject"), "bad");
        return false;
      }
      if (project.investorCut > 0) {
        flashMessage(localize({
          he: "משקיע כבר חתך נתח. יותר מזה זו פשיטת רגל עם חליפה.",
          en: "You already gave away a cut. More than that is bankruptcy in formalwear."
        }), "bad");
        return false;
      }
      if (!spendHours(2, localize({
        he: "פגישה עם משקיע: קפה קטן, אגו גדול.",
        en: "Investor meeting: small coffee, giant ego."
      }))) {
        return false;
      }
      const raise = Math.round((1600 + rand() * 1200) * priceScale());
      project.investorCut = 0.22 + rand() * 0.08;
      changeCash(raise);
      flashMessage(localize({
        he: "משקיע הזרים " + formatMoney(raise) + " תמורת " + Math.round(project.investorCut * 100) + "% מההכנסות.",
        en: "Investor injected " + formatMoney(raise) + " for " + Math.round(project.investorCut * 100) + "% of revenues."
      }), "good");
      playSfx("success");
      saveGame();
      return true;
    }

    function reviewForBuzz(buzz) {
      if (buzz < 0.9) return "flop";
      if (buzz < 1.2) return "meh";
      if (buzz < 1.55) return "hit";
      return "sleeper";
    }

    function genreBase(genreId) {
      const genre = GENRES.find((entry) => entry.id === genreId) || GENRES[0];
      return genre.baseGross;
    }

    function fatigueMultiplier(genreId) {
      return Math.pow(0.7, gameState.genreReleases[genreId] || 0);
    }

    function settleRevenue(project, gross, label) {
      let net = gross;
      if (project.fundRecoup > 0) {
        const fundShare = Math.min(project.fundRecoup, Math.round(net * 0.5));
        project.fundRecoup -= fundShare;
        net -= fundShare;
      }
      if (project.investorCut > 0) {
        const cut = Math.round(net * project.investorCut);
        net -= cut;
      }
      changeCash(net);
      flashMessage(label + ": +" + formatMoney(net), "good");
      playSfx("cash");
      return net;
    }

    function doPremiere(index) {
      const project = projectByIndex(index);
      if (!project) {
        flashMessage(t("needProject"), "bad");
        return false;
      }
      if (project.stage !== "post") {
        flashMessage(localize({
          he: "צריך פוסט גמור לפני פרמיירה.",
          en: "You need completed post before a premiere."
        }), "bad");
        return false;
      }
      const cost = Math.round(480 * priceScale());
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק כסף למרקיזה נוצצת.",
          en: "Not enough cash for a glowing marquee."
        }), "bad");
        return false;
      }
      if (!spendHours(4, localize({
        he: "ערב פרמיירה",
        en: "Premiere night"
      }))) {
        return false;
      }
      changeCash(-cost);
      project.premiered = true;
      project.qualityBoost += 0.08;
      if (project.buzz > 1.45 && rand() < 0.25) {
        adjustStat("reputation", 8);
        note(localize({
          he: "הסרט גרד פרס צדדי. זה עדיין פרס.",
          en: "The film scraped a side prize. Still a prize."
        }));
      }
      gameState.lastRelease = {
        title: project.title,
        verdict: reviewForBuzz(project.buzz),
        copy: localize({
          he: "המרקיזה נדלקה עבור " + project.title + ".",
          en: "The marquee lit up for " + project.title + "."
        })
      };
      flashMessage(localize({
        he: "הפרמיירה נתנה לסרט הילה של 25%.",
        en: "The premiere gave the film a 25% halo."
      }), "good");
      playSfx("release");
      saveGame();
      render();
      return true;
    }

    function releaseProject(project, mode) {
      const base = genreBase(project.genre);
      const tier = SHOOT_TIERS[project.budgetTier || "lean"] || SHOOT_TIERS.lean;
      const premiereBoost = project.premiered ? 1.25 : 1;
      const fatigue = fatigueMultiplier(project.genre);
      const gross = Math.round(base * project.buzz * tier.box * premiereBoost * fatigue * (1 + gameState.reputation * 0.01));
      const equippedGross = Math.round(gross * (1 + equipmentBenefits().releaseBoost));
      if (!project.released) {
        project.released = true;
        gameState.genreReleases[project.genre] = (gameState.genreReleases[project.genre] || 0) + 1;
      }
      project.stage = mode === "cinema" ? "run" : "tv";
      const verdict = reviewForBuzz(project.buzz);
      project.reviewed = verdict;
      gameState.lastRelease = {
        title: project.title,
        verdict,
        copy: t("review" + verdict[0].toUpperCase() + verdict.slice(1))
      };
      if (mode === "cinema") {
        const schedule = [0.36, 0.24, 0.17, 0.13, 0.1];
        schedule.forEach((fraction, index) => {
          gameState.weeklyRevenue.push({
            projectId: project.id,
            amount: Math.round(equippedGross * fraction),
            dueDay: gameState.day + 7 * (index + 1)
          });
        });
        adjustStat("reputation", Math.round(project.buzz * 6 * paceScale()));
        flashMessage(localize({
          he: "הסרט יצא לקולנוע. חמישה תשלומים שבועיים בדרך.",
          en: "The film opened in cinemas. Five weekly payouts are on the way."
        }), "good");
      } else {
        adjustStat("reputation", Math.round(project.buzz * 4 * paceScale()));
        settleRevenue(project, Math.round(equippedGross * 0.78), t("tvSale"));
      }
      playSfx("release");
      saveGame();
      checkEndings();
      render();
      return true;
    }

    function doCinema(index) {
      const project = projectByIndex(index);
      if (!project || project.stage !== "post") {
        flashMessage(localize({
          he: "צריך סרט ערוך ומוכן להפצה.",
          en: "You need an edited film ready for release."
        }), "bad");
        return false;
      }
      if (!spendHours(3, localize({
        he: "סגירת הפצה קולנועית",
        en: "Closing theatrical distribution"
      }))) {
        return false;
      }
      return releaseProject(project, "cinema");
    }

    function doTv(index) {
      const project = projectByIndex(index);
      if (!project || project.stage !== "post") {
        flashMessage(localize({
          he: "צריך סרט גמור לפני מכירת טלוויזיה.",
          en: "You need a completed film before a TV sale."
        }), "bad");
        return false;
      }
      if (!spendHours(2, localize({
        he: "פגישת מכירה לטלוויזיה",
        en: "TV sale meeting"
      }))) {
        return false;
      }
      return releaseProject(project, "tv");
    }

    function bankDo(action, amount = 500) {
      const sum = Math.max(50, Math.round(amount));
      if (action === "deposit") {
        if (gameState.cash < sum) return false;
        changeCash(-sum);
        gameState.bank += sum;
        flashMessage(t("deposit") + ": " + formatMoney(sum), "good");
      } else if (action === "withdraw") {
        if (gameState.bank < sum) return false;
        gameState.bank -= sum;
        changeCash(sum);
        flashMessage(t("withdraw") + ": " + formatMoney(sum), "good");
      } else if (action === "invest") {
        if (gameState.cash < sum) return false;
        changeCash(-sum);
        gameState.fund += sum;
        flashMessage(t("invest") + ": " + formatMoney(sum), "good");
      } else if (action === "cashOut") {
        if (gameState.fund < sum) return false;
        gameState.fund -= sum;
        changeCash(sum);
        flashMessage(t("cashOut") + ": " + formatMoney(sum), "good");
      } else if (action === "borrow") {
        gameState.debt += sum;
        changeCash(sum);
        flashMessage(localize({ he: "הלוואה", en: "Loan" }) + ": " + formatMoney(sum), "bad");
      } else if (action === "repay") {
        const repay = Math.min(sum, gameState.debt, gameState.cash);
        if (repay <= 0) return false;
        gameState.debt -= repay;
        changeCash(-repay);
        flashMessage(t("repay") + ": " + formatMoney(repay), "good");
      } else {
        return false;
      }
      playSfx(action === "borrow" ? "danger" : "cash");
      saveGame();
      render();
      return true;
    }

    function payRentAndHousing() {
      const place = HOUSING[gameState.housing];
      if (!place) {
        return;
      }
      adjustStat("soul", place.soul);
      if (gameState.housing === "couch") {
        adjustStat("love", -1);
        degradeWardrobe(5);
        return;
      }
      if (gameState.day > 1 && (gameState.day - 1) % 30 === 0) {
        const rent = Math.round(place.rent * gameState.rentMultiplier * economyProfile().rent);
        if (gameState.cash >= rent) {
          changeCash(-rent);
          note(t("rentDue") + ": -" + formatMoney(rent));
        } else {
          gameState.housing = "couch";
          adjustStat("soul", -8);
          flashMessage(localize({
            he: "לא שילמת שכירות. פונית חזרה לספה עם קופסה ומבט חלול.",
            en: "You missed rent. Evicted back to the couch with a box and a hollow stare."
          }), "bad");
          playSfx("danger");
        }
      }
      if (gameState.housing === "cheap" && rand() < 0.035 * economyProfile().incident) {
        const loss = Math.min(gameState.cash, Math.round(120 + rand() * 200));
        changeCash(-loss);
        flashMessage(localize({
          he: "מישהו עבר בדירה הזולה. נעלמו " + formatMoney(loss),
          en: "Someone visited the cheap flat. " + formatMoney(loss) + " disappeared."
        }), "bad");
      }
    }

    function settleWeeklyRevenue() {
      const due = gameState.weeklyRevenue.filter((entry) => entry.dueDay <= gameState.day);
      if (!due.length) {
        return;
      }
      due.forEach((entry) => {
        const project = gameState.projects.find((item) => item.id === entry.projectId);
        if (project) {
          settleRevenue(project, entry.amount, t("weeklyRevenue"));
        }
      });
      gameState.weeklyRevenue = gameState.weeklyRevenue.filter((entry) => entry.dueDay > gameState.day);
    }

    function advanceEconomy() {
      gameState.bank = Math.round(gameState.bank * 1.003);
      gameState.debt = Math.round(gameState.debt * 1.005);
      if (gameState.fund > 0) {
        if (rand() < 0.005) {
          gameState.fund = 0;
          flashMessage(localize({
            he: "ארקדי נעלם עם הקרן. הוא שלח גלויה בלי כתובת חזרה.",
            en: "Arkady vanished with the fund. He mailed a postcard with no return address."
          }), "bad");
          playSfx("danger");
        } else {
          const drift = 1 + (rand() < 0.5 ? -1 : 1) * (0.05 + rand() * 0.03);
          gameState.fund = Math.max(0, Math.round(gameState.fund * drift));
        }
      }
      gameState.pricesDrift = clamp(0.98 + rand() * 0.05, 0.96, 1.04);
    }

    function maybeTriggerEvents() {
      if (rand() < 0.12 * economyProfile().incident) {
        const event = pick(MINI_EVENTS);
        if (event) {
          event.apply();
          note(localize({ he: event.he, en: event.en }));
        }
      }
      const month = currentMonth();
      if (gameState.monthCounter !== month) {
        gameState.monthCounter = month;
        gameState.rentMultiplier += 0.06;
        if (month >= 4) {
          const trouble = pick(MONTHLY_TROUBLES);
          if (trouble) {
            trouble.apply();
            flashMessage(localize({ he: trouble.he, en: trouble.en }), "bad");
          }
        }
      }
    }

    function endDay() {
      if (gameState.hour < 23) {
        gameState.hour = 23;
      }
      if (canRender && dom && dom.nightVeil) {
        dom.nightVeil.classList.add("active");
      }
      playSfx("sleep");
      root.setTimeout(() => {
        gameState.day += 1;
        gameState.hour = 7;
        payRentAndHousing();
        settleWeeklyRevenue();
        advanceEconomy();
        tickModifiers();
        tickFlights();
        tickStocks();
        maybeTriggerEvents();
        updateUnlocks();
        checkEndings();
        saveGame();
        triggerDailyBriefing();
        if (canRender && dom && dom.nightVeil) {
          dom.nightVeil.classList.remove("active");
        }
        render();
      }, canRender ? 320 : 0);
      return true;
    }

    function updateDailySystems() {
      settleWeeklyRevenue();
      updateUnlocks();
      checkEndings();
    }

    function checkEndings() {
      if (gameState.debt >= 60000) {
        gameState.winState = { win: false, title: t("youLost"), copy: localize({
          he: "החוב עבר 60,000$. הכריש שלח לך מבט סופי.",
          en: "Debt passed $60,000. The shark sent you a final look."
        }) };
      } else if (allGoalsMet()) {
        gameState.winState = { win: true, title: t("youWon"), copy: t("winCopy") };
        recordScore(true);
      } else if (gameState.day > seasonLength()) {
        gameState.winState = { win: false, title: t("youLost"), copy: t("loseCopy") };
        recordScore(false);
      }
    }

    function recordScore(won) {
      const entry = {
        name: gameState.playerName,
        won,
        day: gameState.day,
        city: gameState.city,
        wealth: scoreWealth(),
        career: scoreCareer(),
        education: scoreEducation(),
        happiness: scoreHappiness()
      };
      const duplicate = gameState.highscores.find((item) => item.day === entry.day && item.name === entry.name && item.won === entry.won);
      if (!duplicate) {
        gameState.highscores.unshift(entry);
        gameState.highscores = gameState.highscores
          .sort((a, b) => (b.won - a.won) || (b.wealth + b.career * 120) - (a.wealth + a.career * 120))
          .slice(0, 10);
        saveScores();
      }
    }

    function currentHint() {
      const project = getFocusedProject();
      if (!gameState.jobId) return { building: "employment", copy: t("boardHintJob") };
      if (gameState.wardrobeTier < 1) return { building: "wardrobe", copy: t("boardHintWardrobe") };
      if (gameState.housing === "couch" && gameState.cash >= Math.round(HOUSING.cheap.rent * gameState.rentMultiplier)) {
        return { building: "home", copy: t("boardHintHousing") };
      }
      if (gameState.education < 1) return { building: "filmSchool", copy: t("boardHintSchool") };
      if (!gameState.equipment.camera) return { building: "gear", copy: t("boardHintCamera") };
      if (!gameState.filmUnlocked) return { building: "gear", copy: t("boardHintCamera") };
      if (!project) return { building: "script", copy: t("boardHintScript") };
      if (project.cast.length < 2) return { building: "casting", copy: t("boardHintCast") };
      if (project.crew.length < 3) return { building: "crew", copy: t("boardHintCrew") };
      if (project.shoots < 2) return { building: "set", copy: t("boardHintSet") };
      if (project.stage !== "post") return { building: "post", copy: t("boardHintPost") };
      return { building: "festival", copy: t("boardHintRelease") };
    }

    function cityHasBuilding(buildingId) {
      return getCity().buildings.includes(buildingId);
    }

    function renderHud() {
      const activeJob = getJob(gameState.jobId);
      dom.hud.innerHTML = `
        <div class="status-box hud-summary">
          <div class="metric">
            <div class="metric-label">${t("cash")}</div>
            <div class="metric-value">${formatMoney(gameState.cash)}</div>
          </div>
          <div class="metric">
            <div class="metric-label">${t("job")}</div>
            <div class="metric-value">${activeJob ? localize(activeJob.title) : t("noJob")}</div>
          </div>
          <div class="metric">
            <div class="metric-label">${t("housing")}</div>
            <div class="metric-value">${localize(HOUSING[gameState.housing].name)}</div>
          </div>
          <div class="metric">
            <div class="metric-label">${t("city")}</div>
            <div class="metric-value">${localize(getCity().name)}</div>
          </div>
        </div>
        <div class="controls-box">

          <button class="icon-btn" data-action="showStart" title="${t("newYear")}">${localize({ he: "חדש", en: "New" })}</button>

    function toggleFullscreen() {
      const el = document.documentElement;
      const isFs = document.fullscreenElement || document.webkitFullscreenElement;
      if (!isFs) {
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) req.call(el);
      } else {
        const exit = document.exitFullscreen || document.webkitExitFullscreen;
        if (exit) exit.call(document);
      }
    }

    function buildingPos(index, total) {
      const angle = (-90 + (360 / total) * index) * Math.PI / 180;
      const rx = total > 8 ? 40 : 38;
      const ry = total > 8 ? 34 : 31;
      return {
        left: 50 + Math.cos(angle) * rx,
        top: 50 + Math.sin(angle) * ry
      };
    }

    function buildingMarkup(buildingId, index, total, hintBuilding) {
      const building = getBuilding(buildingId);
      const pos = buildingPos(index, total);
      const selected = buildingId === gameState.currentBuilding;
      const active = buildingId === hintBuilding;
      return `
        <button class="building ${selected ? "selected" : ""} ${active ? "target" : ""}" style="left:${pos.left}%;top:${pos.top}%;" data-action="goToBuilding" data-value="${buildingId}">
          <div class="building-card" style="--b1:${building.color[0]};--b2:${building.color[1]}">
            <div class="roof"></div>
            <div class="sign">${localize(building.label)}</div>
            <div class="facade">
              <div class="windows">

    function renderStartScreen() {
      if (gameState.started && !dom.forceStart) {
        dom.startScreen.classList.add("hidden");
        dom.startScreen.innerHTML = "";
        return;
      }
      dom.startScreen.classList.remove("hidden");
      dom.startScreen.innerHTML = `
        <div class="start-card">
          <h1>${t("title")}</h1>
          <p class="subtitle">${t("subtitle")}</p>
          <p>${t("startIntro")}</p>
          <div class="start-grid">
            <div class="field">
              <label>${t("playerName")}</label>
              <input id="startName" value="${escapeAttr(gameState.playerName)}">
            </div>
            <div class="field">
              <label>${t("economyDiff")}</label>
              <select id="startEconomy">
                ${["modest", "ambitious", "legendary"].map((level) => `<option value="${level}" ${gameState.economyDifficulty === level ? "selected" : ""}>${t(level)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label>${t("seasonLength")}</label>
              <select id="startSeason">
                ${[30, 90, 365].map((len) => `<option value="${len}" ${seasonLength() === len ? "selected" : ""}>${t("season" + len)}</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="goal-picks">
            ${[
              ["wealth", t("goalWealth")],
              ["career", t("goalCareer")],
              ["education", t("goalEducation")],
              ["happiness", t("goalHappiness")]
            ].map(([id, label]) => `
              <div class="field">
                <label>${label}</label>
                <select id="goal-${id}">
                  ${["modest", "ambitious", "legendary"].map((level) => `<option value="${level}" ${gameState.goalLevels[id] === level ? "selected" : ""}>${t(level)}</option>`).join("")}
                </select>
              </div>
            `).join("")}
          </div>
          <div class="start-actions">
            <div class="start-actions-primary">
              <button class="start-card button" data-action="loadGame">${t("resumeButton")}</button>
              <button class="lead-btn" data-action="startFromScreen">${t("startButton")}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderWinLoss() {
      if (!gameState.winState) {
        dom.winLoss.classList.add("hidden");
        dom.winLoss.innerHTML = "";
        return;
      }
      dom.winLoss.classList.remove("hidden");
      dom.winLoss.innerHTML = `
        <div class="win-card">
          <h2>${gameState.winState.title}</h2>
          <p>${gameState.winState.copy}</p>
          <p>${t("wealth")}: ${scoreWealth()} • ${t("career")}: ${scoreCareer()} • ${t("education")}: ${scoreEducation()} • ${t("happiness")}: ${scoreHappiness()}</p>
          <button class="lead-btn" data-action="resetGame">${t("playAgain")}</button>
        </div>
      `;
    }

    function escapeAttr(value) {
      return String(value).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    function render() {
      if (!canRender || !dom) {
        return;
      }
      normalizeCurrentBuilding();
      syncDocument();
      applyTheme();
      renderHud();
      renderBoard();
      renderSidePanel();
      renderStatusWindow();
      renderNoticeWindow();
      renderStartScreen();
      renderWinLoss();
    }

    function bindEvents() {
      document.body.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) {
          return;
        }
        const action = target.getAttribute("data-action");
        const value = target.getAttribute("data-value");
        if (action === "goToBuilding") {
          goToBuilding(value);
        } else if (action === "applyJob") {
          applyJob(value);
        } else if (action === "workShift") {
          workShift(Number(value));
        } else if (action === "switchHousing") {
          switchHousing(value);
        } else if (action === "buyWardrobe") {
          buyWardrobe(Number(value));
        } else if (action === "takeGig") {
          takeGig(value);
        } else if (action === "softAction") {
          doSoftAction(value);
        } else if (action === "flyTo") {
          flyTo(value);
        } else if (action === "openOfferDeck") {
          openOfferDeck(value);
        } else if (action === "buyScript") {
          buyScript(Number(value || 0));
        } else if (action === "hire") {
          const parts = String(value).split(":");
          hire(parts[0], Number(parts[1] || 0));
        } else if (action === "haggle") {
          const parts = String(value).split(":");
          haggle(Number(parts[0]), Number(parts[1]));
        } else if (action === "attendClass") {
          attendClass(value);
        } else if (action === "buyEquip") {
          buyEquip(value);
        } else if (action === "doFund") {
          doFund(value || "production");
        } else if (action === "doPinv") {
          doPinv();
        } else if (action === "doPost") {
          doPost();
        } else if (action === "doPremiere") {
          doPremiere();
        } else if (action === "doCinema") {
          doCinema();
        } else if (action === "doTv") {
          doTv();
        } else if (action === "doShoot") {
          doShoot(undefined, value);
        } else if (action === "bankDo") {
          const parts = String(value).split(":");
          bankDo(parts[0], Number(parts[1] || 0));
        } else if (action === "buyStock") {
          if (buyStock(value, 1)) render();
        } else if (action === "sellStock") {
          if (sellStock(value, 1)) render();
        } else if (action === "endDay") {
          endDay();
        } else if (action === "setFocusedProject") {
          setFocusedProject(value);
        } else if (action === "toggleStatusWindow") {
          dom.statusWindowOpen = !dom.statusWindowOpen;
          render();
        } else if (action === "closeNotice") {
          if (dom.noticeTimer) {
            root.clearTimeout(dom.noticeTimer);
            dom.noticeTimer = null;
          }
          gameState.activeNotice = null;
          render();
        } else if (action === "toggleMute") {
          toggleMute();
        } else if (action === "cycleTheme") {
          cycleTheme();
        } else if (action === "saveGame") {
          saveGame({ notify: true });
        } else if (action === "setLanguage") {
          setLanguage(value);
        } else if (action === "showStart") {
          dom.forceStart = true;
          renderStartScreen();
        } else if (action === "loadGame") {
          dom.forceStart = false;
          loadGame();
        } else if (action === "startFromScreen") {
          startFromScreen();
        } else if (action === "resetGame") {
          resetGame();
        } else if (action === "toggleFullscreen") {
          toggleFullscreen();
        } else if (action === "shootOnPhone") {
          if (shootOnPhone(value)) render();
        }
      });
    }

    function startFromScreen() {
      const nameField = document.getElementById("startName");
      const economyField = document.getElementById("startEconomy");
      const seasonField = document.getElementById("startSeason");
      const goals = {
        wealth: document.getElementById("goal-wealth").value,
        career: document.getElementById("goal-career").value,
        education: document.getElementById("goal-education").value,
        happiness: document.getElementById("goal-happiness").value
      };
      startGame({
        playerName: (nameField.value || "").trim() || (gameState.language === "he" ? "קובי" : "Jones"),
        economyDifficulty: economyField.value,
        seasonLength: Number(seasonField.value),
        goalLevels: goals
      });
    }

    function resetGame() {
      const prefs = loadPrefs();
      gameState = createState({
        language: prefs.language || gameState.language,
        themeIndex: Number.isInteger(prefs.themeIndex) ? prefs.themeIndex : gameState.themeIndex,
        muted: !!prefs.muted,
        highscores: loadScores()
      });
      if (dom) {
        dom.forceStart = true;
        dom.statusWindowOpen = false;
      }
      savePrefs();
      applyTheme();
      syncDocument();
      render();
      return true;
    }

    function startGame(options = {}) {
      const highscores = loadScores();
      const prefs = loadPrefs();
      gameState = createState({
        started: true,
        playerName: options.playerName || prefs.playerName || gameState.playerName,
        economyDifficulty: options.economyDifficulty || prefs.economyDifficulty || "modest",
        goalLevels: options.goalLevels || prefs.goalLevels || { wealth: "modest", career: "modest", education: "modest", happiness: "modest" },
        seasonLength: [30, 90, 365].includes(options.seasonLength) ? options.seasonLength : (gameState.seasonLength || 365),
        language: gameState.language,
        themeIndex: gameState.themeIndex,
        muted: gameState.muted,
        highscores
      });
      if (dom) {
        dom.forceStart = false;
        dom.statusWindowOpen = false;
      }
      savePrefs();
      saveGame();
      triggerDailyBriefing();
      render();
      return true;
    }

    function init() {
      dom = {
        hud: document.getElementById("hud"),
        boardStage: document.getElementById("boardStage"),
        sidePanel: document.getElementById("sidePanel"),
        startScreen: document.getElementById("startScreen"),
        winLoss: document.getElementById("winLoss"),
        statusWindow: document.getElementById("statusWindow"),
        incidentWindow: document.getElementById("incidentWindow"),
        floatLayer: document.getElementById("floatLayer"),
        nightVeil: document.getElementById("nightVeil"),
        noticeTimer: null,
        statusWindowOpen: false,
        forceStart: false
      };
      bindEvents();
      applyTheme();
      syncDocument();
      render();
    }

    root.getState = () => gameState;
    root.startGame = startGame;
    root.resetGame = resetGame;
    root.setLanguage = setLanguage;
    root.cycleTheme = cycleTheme;
    root.toggleMute = toggleMute;
    root.goToBuilding = goToBuilding;
    root.flyTo = flyTo;
    root.endDay = endDay;
    root.applyJob = applyJob;
    root.workShift = workShift;
    root.switchHousing = switchHousing;
    root.buyWardrobe = buyWardrobe;
    root.takeGig = takeGig;
    root.attendClass = attendClass;
    root.buyEquip = buyEquip;
    root.openOfferDeck = openOfferDeck;
    root.buyScript = buyScript;
    root.hire = hire;
    root.haggle = haggle;
    root.doShoot = doShoot;
    root.doPost = doPost;
    root.doPremiere = doPremiere;
    root.doCinema = doCinema;
    root.doTv = doTv;
    root.doFund = doFund;
    root.doPinv = doPinv;
    root.bankDo = bankDo;
    root.setFocusedProject = setFocusedProject;
    root.saveGame = saveGame;
    root.loadGame = loadGame;
    root.buyStock = buyStock;
    root.sellStock = sellStock;
    root.shootOnPhone = shootOnPhone;
    root.toggleFullscreen = toggleFullscreen;

    if (canRender) {
      init();
    }
  })();
  </script>
</body>
</html>
