    function adaptUiText(str) {
      if (typeof str !== "string" || gameState.language !== "he") {
        return str;
      }
      return str
        .replace(/-\$(\d[\d,]*(?:\.\d+)?)/g, "-$1 ₪")
        .replace(/\$(\d[\d,]*(?:\.\d+)?)/g, "$1 ₪")
        .replace(/(\d[\d,]*(?:\.\d+)?)\$/g, "$1 ₪")
        .replace(/\/h\b/g, "/ש")
        .replace(/(\d+)h\b/g, "$1ש");
    }

    function t(key, vars = {}) {
      const lang = gameState.language in TEXT ? gameState.language : "he";
      let str = TEXT[lang][key] || TEXT.he[key] || key;
      Object.keys(vars).forEach((name) => {
        str = str.replace(new RegExp("\\{" + name + "\\}", "g"), String(vars[name]));
      });
      return adaptUiText(str);
    }

    function localize(value) {
      if (value == null) {
        return "";
      }
      if (typeof value === "string") {
        return adaptUiText(value);
      }
      return adaptUiText(value[gameState.language] || value.he || value.en || "");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand() {
      gameState.seed = (gameState.seed * 1664525 + 1013904223) >>> 0;
      return gameState.seed / 4294967296;
    }

    function pick(array) {
      if (!array.length) {
        return null;
      }
      return array[Math.floor(rand() * array.length)];
    }

    // Dedicated RNG stream for cosmetic content (daily briefing) so picking a
    // morning event never disturbs the tuned economy's rand() sequence.
    function briefingRand() {
      gameState.briefSeed = (gameState.briefSeed * 1664525 + 1013904223) >>> 0;
      return gameState.briefSeed / 4294967296;
    }

    function triggerDailyBriefing() {
      const events = (root.GAME_DATA && root.GAME_DATA.dailyEvents) || [];
      if (!events.length) {
        return;
      }
      // A calendar-pinned event (minDay === maxDay === today) always wins its day.
      let chosen = events.find((e) => e.minDay === gameState.day && e.maxDay === gameState.day);
      if (!chosen) {
        // Events may declare requires(state) — used for NPC memory-callbacks
        // that only surface when relationship thresholds have been crossed.
        const meetsRequires = (e) => !e.requires || (function () {
          try { return !!e.requires(gameState); } catch (_err) { return false; }
        })();
        const eligible = events.filter((e) =>
          (e.weight || 0) > 0 &&
          gameState.day >= (e.minDay || 1) &&
          (!e.maxDay || gameState.day <= e.maxDay) &&
          e.id !== gameState.lastBriefId &&
          meetsRequires(e)
        );
        const pool = eligible.length
          ? eligible
          : events.filter((e) => (e.weight || 0) > 0 && gameState.day >= (e.minDay || 1) && (!e.maxDay || gameState.day <= e.maxDay) && meetsRequires(e));
        if (!pool.length) {
          return;
        }
        const total = pool.reduce((sum, e) => sum + (e.weight || 1), 0);
        let roll = briefingRand() * total;
        chosen = pool[pool.length - 1];
        for (let i = 0; i < pool.length; i += 1) {
          roll -= (pool[i].weight || 1);
          if (roll <= 0) {
            chosen = pool[i];
            break;
          }
        }
      }
      const headline = localize(chosen.headline);
      const body = localize(chosen.body);
      const tone = chosen.tone || "neutral";
      gameState.lastBriefId = chosen.id;
      gameState.dailyBriefing = { id: chosen.id, headline, body, tone, day: gameState.day };
      gameState.activeNotice = { id: "brief-" + gameState.day, title: headline, copy: body, tone };
      applyBriefingModifier(chosen);
      note(headline + " — " + body, tone);
      maybeTriggerStoryBeat();
    }

    function loadPrefs() {
      try {
        if (!root.localStorage) {
          return {};
        }
        return JSON.parse(root.localStorage.getItem(STORAGE_KEYS.prefs) || "{}");
      } catch (_err) {
        return {};
      }
    }

    function savePrefs() {
      try {
        if (!root.localStorage) {
          return;
        }
        root.localStorage.setItem(STORAGE_KEYS.prefs, JSON.stringify({
          language: gameState.language,
          playerName: gameState.playerName,
          economyDifficulty: gameState.economyDifficulty,
          goalLevels: gameState.goalLevels,
          seasonLength: gameState.seasonLength,
          themeIndex: gameState.themeIndex,
          muted: gameState.muted
        }));
      } catch (_err) {
      }
    }

    function loadScores() {
      try {
        if (!root.localStorage) {
          return [];
        }
        return JSON.parse(root.localStorage.getItem(STORAGE_KEYS.scores) || "[]");
      } catch (_err) {
        return [];
      }
    }

    function saveScores() {
      try {
        if (!root.localStorage) {
          return;
        }
        root.localStorage.setItem(STORAGE_KEYS.scores, JSON.stringify(gameState.highscores.slice(0, 10)));
      } catch (_err) {
      }
    }

    // saveGame is called after most actions to persist progress.
    // We only show the toast when the user explicitly clicks "Save" in the
    // HUD — auto-saves stay silent so they don't pollute the screen.
    function saveGame(options) {
      try {
        if (!root.localStorage) {
          return false;
        }
        root.localStorage.setItem(STORAGE_KEYS.save, JSON.stringify(gameState));
        if (options && options.notify) {
          flashMessage(t("saved"), "good");
        }
        return true;
      } catch (_err) {
        return false;
      }
    }

    function loadGame() {
      try {
        if (!root.localStorage) {
          return false;
        }
        const raw = root.localStorage.getItem(STORAGE_KEYS.save);
        if (!raw) {
          flashMessage(t("noSave"), "bad");
          return false;
        }
        const parsed = JSON.parse(raw);
        gameState = Object.assign(createState(), parsed);
        gameState.activeNotice = null;
        if (!Array.isArray(gameState.highscores)) {
          gameState.highscores = loadScores();
        }
        gameState.started = true;
        if (dom) {
          dom.statusWindowOpen = false;
        }
        note(t("saveLoaded"));
        savePrefs();
        applyTheme();
        syncDocument();
        render();
        return true;
      } catch (_err) {
        flashMessage(t("noSave"), "bad");
        return false;
      }
    }

    function setLanguage(lang) {
      gameState.language = lang === "en" ? "en" : "he";
      savePrefs();
      syncDocument();
      render();
    }

    function syncDocument() {
      if (!canRender) {
        return;
      }
      document.documentElement.lang = gameState.language;
      document.documentElement.dir = gameState.language === "he" ? "rtl" : "ltr";
      document.title = t("title");
      document.documentElement.style.setProperty("--window-title", JSON.stringify(t("title")));
    }

    function applyTheme() {
      if (!canRender) {
        return;
      }
      const preset = THEME_PRESETS[gameState.themeIndex % THEME_PRESETS.length];
      Object.keys(preset.vars).forEach((key) => {
        document.documentElement.style.setProperty(key, preset.vars[key]);
      });
    }

    function cycleTheme() {
      gameState.themeIndex = (gameState.themeIndex + 1) % THEME_PRESETS.length;
      applyTheme();
      savePrefs();
      render();
    }

    function toggleMute() {
      gameState.muted = !gameState.muted;
      savePrefs();
      render();
    }

    function getCity(cityId = gameState.city) {
      return CITIES.find((city) => city.id === cityId) || CITIES[0];
    }

    function getBuilding(id) {
      return BUILDINGS[id] || BUILDINGS.home;
    }

    function currentMonth() {
      return Math.floor((gameState.day - 1) / 30) + 1;
    }

    function seasonLength() {
      return [30, 90, 365].includes(gameState.seasonLength) ? gameState.seasonLength : 365;
    }

    function paceScale() {
      // Shorter seasons accelerate "soft" gains (wages, study, grants, release rep)
      // by a moderate sqrt factor so a strong status is reachable in time. 365 => 1.
      return Math.sqrt(365 / seasonLength());
    }

    function daysLeft() {
      return Math.max(0, seasonLength() - gameState.day);
    }

    function economyProfile() {
      return ECONOMY[gameState.economyDifficulty] || ECONOMY.modest;
    }

    function priceScale() {
      const profile = economyProfile();
      const releaseScale = Math.min(1.6, 1 + gameState.projects.filter((p) => p.released).length * 0.05);
      return profile.prices * gameState.pricesDrift * releaseScale;
    }

    // Narrow modifier channel: temporary effects from daily briefings. Only
    // touches buyEquip price (category "gear") and attendClass cost/credits
    // ("course" / "courseCredits"). Stays clear of the calibrated film economy.
    function modifierMultiplier(category) {
      const mods = gameState.activeModifiers || [];
      let mult = 1;
      for (let i = 0; i < mods.length; i += 1) {
        if (mods[i].category === category) {
          mult *= mods[i].value;
        }
      }
      return mult;
    }

    function applyBriefingModifier(briefing) {
      if (!briefing || !briefing.modifier) {
        return;
      }
      const m = briefing.modifier;
      if (!m.category || typeof m.value !== "number") {
        return;
      }
      if (!Array.isArray(gameState.activeModifiers)) {
        gameState.activeModifiers = [];
      }
      // Replace any active modifier in the same category — one effect per slot.
      gameState.activeModifiers = gameState.activeModifiers.filter(
        (existing) => existing.category !== m.category
      );
      gameState.activeModifiers.push({
        id: briefing.id + ":" + gameState.day,
        briefingId: briefing.id,
        category: m.category,
        value: m.value,
        daysLeft: Math.max(1, m.days || 3),
        label: briefing.headline || { he: briefing.id, en: briefing.id }
      });
    }

    // Suggested moves panel — three soft hints the player can ignore. Each
    // move scores higher when an active modifier makes its action timely.
    function computeSuggestedMoves() {
      const moves = [];
      const studyBuilding = cityHasBuilding("filmSchool")
        ? "filmSchool"
        : (cityHasBuilding("cinematheque") ? "cinematheque" : null);
      const courseMod = modifierMultiplier("course");
      const creditMod = modifierMultiplier("courseCredits");
      const courseBase = (typeof COURSES !== "undefined" && COURSES[0] && COURSES[0].cost) || 80;
      const studyCost = Math.round(courseBase * priceScale() * courseMod);
      const studyHot = courseMod < 1 || creditMod > 1;

      if (gameState.education < 3 && studyBuilding && gameState.cash >= studyCost) {
        moves.push({
          key: "study",
          score: studyHot ? 95 : (gameState.education < 1 ? 80 : 55),
          icon: "🎓",
          title: { he: "ללמוד", en: "Study" },
          reason: studyHot
            ? { he: "שיעור זול היום (" + studyCost + " ₪)", en: "Class is cheap today (" + studyCost + ")" }
            : { he: "השכלה פותחת עבודות", en: "Education unlocks jobs" },
          action: "goToBuilding",
          value: studyBuilding
        });
      } else if (!studyBuilding && studyHot && gameState.education < 3 && gameState.cash >= 600) {
        moves.push({
          key: "fly_study",
          score: 70,
          icon: "✈️",
          title: { he: "טוס ללמוד", en: "Fly to study" },
          reason: { he: "שכר לימוד ירד — אתונה פתוחה", en: "Tuition is down in Athens" },
          action: "flyTo",
          value: "athens"
        });
      }

      if (cityHasBuilding("fund") && gameState.cash >= 500 && gameState.fund < 2500) {
        moves.push({
          key: "arkady",
          score: 60,
          icon: "💼",
          title: { he: "ארקדי וקרן הקולנוע", en: "Arkady and the fund" },
          reason: gameState.fund > 0
            ? { he: "יש לך כסף בקרן — לבדוק", en: "You have cash in the fund" }
            : { he: "הפקדה קטנה יכולה לצמוח", en: "A small deposit could grow" },
          action: "goToBuilding",
          value: "fund"
        });
      } else if (!cityHasBuilding("fund") && gameState.fund > 0 && gameState.cash >= 800) {
        moves.push({
          key: "fly_fund",
          score: 45,
          icon: "✈️",
          title: { he: "טוס לתל אביב", en: "Fly to Tel Aviv" },
          reason: { he: "הקרן שלך שם — כדאי לבדוק", en: "Your fund is there — worth a check" },
          action: "flyTo",
          value: "telaviv"
        });
      }

      if (gameState.filmUnlocked && cityHasBuilding("festival")) {
        moves.push({
          key: "festival_here",
          score: 75,
          icon: "🎬",
          title: { he: "פסטיבל בעיר", en: "Festival in town" },
          reason: { he: "סרט מוכן רוצה אולם", en: "A finished film wants a screen" },
          action: "goToBuilding",
          value: "festival"
        });
      } else if (gameState.filmUnlocked && !cityHasBuilding("festival") && gameState.cash >= 600) {
        const target = gameState.city === "telaviv" ? "berlin" : (gameState.city === "berlin" ? "london" : "berlin");
        moves.push({
          key: "fly_festival",
          score: 50,
          icon: "✈️",
          title: { he: "טוס לפסטיבל", en: "Fly to a festival" },
          reason: { he: "ברלין או לונדון פתוחים", en: "Berlin or London is open" },
          action: "flyTo",
          value: target
        });
      }

      return moves.sort((a, b) => b.score - a.score).slice(0, 3);
    }

    // --- Newsletter content: today's headlines drawn from briefing + modifiers + flights ---
    function computeNewsItems() {
      const items = [];
      const brief = gameState.dailyBriefing;
      if (brief && brief.day === gameState.day) {
        items.push({
          icon: brief.tone === "good" ? "🗞" : (brief.tone === "bad" ? "⚠️" : "📰"),
          title: brief.headline,
          subtitle: brief.body
        });
      }
      const mods = Array.isArray(gameState.activeModifiers) ? gameState.activeModifiers : [];
      mods.forEach((m) => {
        const tagMap = {
          gear: { he: "ציוד", en: "Gear" },
          course: { he: "שכר לימוד", en: "Tuition" },
          courseCredits: { he: "קרדיטים", en: "Credits" }
        };
        const tag = localize(tagMap[m.category] || { he: m.category, en: m.category });
        const pct = Math.round((m.value - 1) * 100);
        const isGood = m.category === "courseCredits" ? m.value > 1 : m.value < 1;
        items.push({
          icon: isGood ? "🟢" : "🔴",
          title: tag + " " + (pct > 0 ? "+" : "") + pct + "%",
          subtitle: localize({
            he: "תקף עוד " + m.daysLeft + " ימים",
            en: "Active for " + m.daysLeft + " more days"
          }),
          good: isGood
        });
      });
      // Flight callouts: the single cheapest and the single priciest destination
      ensureFlightIndex();
      const flights = Object.keys(FLIGHT_BASE)
        .filter((c) => c !== gameState.city)
        .map((c) => ({ city: c, idx: gameState.flightIndex[c] || 1 }));
      if (flights.length) {
        const cheapest = flights.slice().sort((a, b) => a.idx - b.idx)[0];
        const priciest = flights.slice().sort((a, b) => b.idx - a.idx)[0];
        const cityName = (cid) => localize((CITIES.find((c) => c.id === cid) || {}).name || { he: cid, en: cid });
        if (cheapest && cheapest.idx < 0.92) {
          items.push({
            icon: "✈️",
            title: localize({ he: "טיסה זולה ל" + cityName(cheapest.city), en: "Cheap flight to " + cityName(cheapest.city) }),
            subtitle: localize({
              he: "פחות " + Math.round((1 - cheapest.idx) * 100) + "% מהממוצע",
              en: Math.round((1 - cheapest.idx) * 100) + "% under average"
            }),
            good: true
          });
        }
        if (priciest && priciest.idx > 1.12) {
          items.push({
            icon: "🛫",
            title: localize({ he: "מחיר טיסה זינק ל" + cityName(priciest.city), en: "Flight spike to " + cityName(priciest.city) }),
            subtitle: localize({
              he: "+" + Math.round((priciest.idx - 1) * 100) + "% מהממוצע",
              en: "+" + Math.round((priciest.idx - 1) * 100) + "% over average"
            }),
            good: false
          });
        }
      }
      return items.slice(0, 6);
    }

    function newsItemMarkup(item) {
      const title = localize(item.title);
      const subtitle = localize(item.subtitle);
      return `
        <div class="news-item">
          <span class="news-icon">${item.icon}</span>
          <div class="news-body">
            <strong>${title}</strong>
            <span>${subtitle}</span>
          </div>
        </div>
      `;
    }

    function stockRowMarkup(def) {
      ensureStocks();
      const s = gameState.stocks[def.ticker];
      const holding = (gameState.holdings && gameState.holdings[def.ticker]) || 0;
      const price = s.price;
      const last = s.lastPrice || price;
      const deltaPct = last === 0 ? 0 : ((price - last) / last) * 100;
      const deltaClass = deltaPct > 0.5 ? "delta-up" : (deltaPct < -0.5 ? "delta-down" : "delta-flat");
      const deltaArrow = deltaPct > 0.5 ? "▲" : (deltaPct < -0.5 ? "▼" : "·");
      const priceText = price >= 1000 ? Math.round(price).toLocaleString("en-US") : price.toFixed(price < 100 ? 2 : 1);
      const canBuy = gameState.cash >= price;
      const canSell = holding > 0;
      const displayName = localize(def.name);
      return `
        <tr>
          <td class="ticker"><strong>${displayName}</strong><span class="ticker-code">${def.ticker}</span></td>
          <td class="price">${priceText}</td>
          <td class="${deltaClass}">${deltaArrow} ${Math.abs(deltaPct).toFixed(1)}%</td>
          <td class="qty">${holding || "—"}</td>
          <td>
            <button class="market-btn" data-action="buyStock" data-value="${def.ticker}" ${canBuy ? "" : "disabled"}>${localize({ he: "קנה", en: "Buy" })}</button>
            <button class="market-btn" data-action="sellStock" data-value="${def.ticker}" ${canSell ? "" : "disabled"}>${localize({ he: "מכר", en: "Sell" })}</button>
          </td>
        </tr>
      `;
    }

    function suggestedMoveMarkup(move) {
      const title = localize(move.title);
      const reason = localize(move.reason);
      return `
        <button class="suggested-move" data-action="${move.action}" data-value="${move.value}">
          <div class="move-icon">${move.icon}</div>
          <strong>${title}</strong>
          <span class="move-reason">${reason}</span>
        </button>
      `;
    }

    function modifierChipMarkup(m) {
      const tags = {
        gear: { he: "ציוד", en: "Gear" },
        course: { he: "לימוד", en: "Tuition" },
        courseCredits: { he: "קרדיט", en: "Credits" }
      };
      const tag = localize(tags[m.category] || { he: m.category, en: m.category });
      const pct = Math.round((m.value - 1) * 100);
      const sign = pct > 0 ? "+" : "";
      const isGood = m.category === "courseCredits" ? m.value > 1 : m.value < 1;
      const daysSuffix = localize({
        he: " · " + m.daysLeft + " י׳",
        en: " · " + m.daysLeft + "d"
      });
      return `<span class="inv-chip mod-chip-${isGood ? "good" : "bad"}">${tag} ${sign}${pct}%${daysSuffix}</span>`;
    }

    // --- Flight pricing (per-destination, mean-reverting daily walk) ---
    // Inspired by the "FILM MASTER" prototype where each city has its own
    // daily flight price. Here it's a soft mean-reverting walk per city so
    // a player who watches the prices can time a cheap flight.
    const FLIGHT_BASE = {
      telaviv: 160,
      athens:  140,
      berlin:  200,
      london:  260,
      nyc:     380,
      paris:   220
    };

    function ensureFlightIndex() {
      if (!gameState.flightIndex || typeof gameState.flightIndex !== "object") {
        gameState.flightIndex = {};
      }
      Object.keys(FLIGHT_BASE).forEach((c) => {
        if (typeof gameState.flightIndex[c] !== "number") {
          gameState.flightIndex[c] = 0.9 + rand() * 0.2;
        }
      });
    }

    function tickFlights() {
      ensureFlightIndex();
      Object.keys(gameState.flightIndex).forEach((c) => {
        const cur = gameState.flightIndex[c];
        const drift = (1 - cur) * 0.22;
        const noise = (rand() - 0.5) * 0.22;
        gameState.flightIndex[c] = clamp(cur + drift + noise, 0.55, 1.7);
      });
    }

    function flightCost(destCityId) {
      ensureFlightIndex();
      const base = FLIGHT_BASE[destCityId] || 180;
      const idx = gameState.flightIndex[destCityId] || 1;
      return Math.round(base * idx * priceScale());
    }

    // --- Stock market (4 instruments, daily walk, buy/sell) ---
    // Fictional brands — stylized clones, no real trademarks
    const STOCK_DEFS = [
      { ticker: "A26",  initial: 380,   vol: 0.055, name: { he: "א.26",       en: "A26" } },
      { ticker: "NTFK", initial: 480,   vol: 0.045, name: { he: "נטפליק",     en: "Netfleek" } },
      { ticker: "PRMX", initial: 14,    vol: 0.07,  name: { he: "פראמקס",    en: "Paramax" } },
      { ticker: "KOIN", initial: 60000, vol: 0.11,  name: { he: "קוין-קוין",   en: "KoinKoin" } }
    ];

    function ensureStocks() {
      if (!gameState.stocks || typeof gameState.stocks !== "object") {
        gameState.stocks = {};
      }
      if (!gameState.holdings || typeof gameState.holdings !== "object") {
        gameState.holdings = {};
      }
      STOCK_DEFS.forEach((def) => {
        if (!gameState.stocks[def.ticker]) {
          gameState.stocks[def.ticker] = { price: def.initial, lastPrice: def.initial };
        }
        if (typeof gameState.holdings[def.ticker] !== "number") {
          gameState.holdings[def.ticker] = 0;
        }
      });
    }

    function tickStocks() {
      ensureStocks();
      STOCK_DEFS.forEach((def) => {
        const s = gameState.stocks[def.ticker];
        if (!s) return;
        s.lastPrice = s.price;
        const meanRevert = (def.initial - s.price) / def.initial * 0.06;
        const noise = (rand() - 0.5) * 2 * def.vol;
        const next = s.price * (1 + meanRevert + noise);
        s.price = Math.max(def.initial * 0.1, Math.round(next * 100) / 100);
      });
    }

    function buyStock(ticker, qty) {
      ensureStocks();
      const s = gameState.stocks[ticker];
      if (!s) return false;
      qty = Math.max(1, Math.floor(qty || 1));
      const cost = Math.round(s.price * qty);
      if (gameState.cash < cost) {
        flashMessage(localize({ he: "אין מספיק מזומן", en: "Not enough cash" }), "bad");
        return false;
      }
      changeCash(-cost);
      gameState.holdings[ticker] = (gameState.holdings[ticker] || 0) + qty;
      playSfx("cash");
      saveGame();
      return true;
    }

    function sellStock(ticker, qty) {
      ensureStocks();
      const s = gameState.stocks[ticker];
      if (!s) return false;
      qty = Math.max(1, Math.floor(qty || 1));
      const have = gameState.holdings[ticker] || 0;
      if (have < qty) {
        flashMessage(localize({ he: "אין מספיק יחידות למכור", en: "Not enough units to sell" }), "bad");
        return false;
      }
      const revenue = Math.round(s.price * qty);
      changeCash(revenue);
      gameState.holdings[ticker] = have - qty;
      playSfx("cash");
      saveGame();
      return true;
    }

    function tickModifiers() {
      if (!Array.isArray(gameState.activeModifiers) || !gameState.activeModifiers.length) {
        return;
      }
      const next = [];
      for (let i = 0; i < gameState.activeModifiers.length; i += 1) {
        const m = gameState.activeModifiers[i];
        const daysLeft = m.daysLeft - 1;
        if (daysLeft > 0) {
          next.push(Object.assign({}, m, { daysLeft }));
        }
      }
      gameState.activeModifiers = next;
    }

    function formatMoney(value) {
      const rounded = Math.round(value);
      if (gameState.language === "he") {
        return (rounded < 0 ? "-" : "") + Math.abs(rounded) + " ₪";
      }
      return (rounded < 0 ? "-$" + Math.abs(rounded) : "$" + rounded);
    }

    function formatHour(hour) {
      return String(hour).padStart(2, "0") + ":00";
    }

    function formatDuration(hours) {
      return gameState.language === "he" ? hours + "ש" : hours + "h";
    }

    function visibleBuildings(city = getCity()) {
      return (city.buildings || []).filter((buildingId) => buildingId !== "airport");
    }

    function normalizeCurrentBuilding() {
      const currentCity = getCity();
      const available = visibleBuildings(currentCity);
      if (!available.includes(gameState.currentBuilding)) {
        gameState.currentBuilding = available[0] || "home";
      }
    }

    function equipmentBenefits() {
      const benefits = {
        shootDiscount: 0,
        postDiscount: 0,
        buzzBoost: 0,
        qualityBoost: 0,
        releaseBoost: 0
      };
      if (gameState.equipment.camera) {
        benefits.shootDiscount += 0.08;
        benefits.buzzBoost += 0.04;
        benefits.qualityBoost += 0.03;
      }
      if (gameState.equipment.studio) {
        benefits.postDiscount += 0.3;
        benefits.buzzBoost += 0.09;
        benefits.releaseBoost += 0.04;
      }
      if (gameState.equipment.insurance) {
        benefits.shootDiscount += 0.12;
        benefits.postDiscount += 0.08;
        benefits.buzzBoost += 0.06;
        benefits.qualityBoost += 0.04;
      }
      return benefits;
    }

    function shootCost(baseCost) {
      return Math.round(baseCost * priceScale() * (1 - equipmentBenefits().shootDiscount));
    }

    function postCost(baseCost = 920) {
      return Math.round(baseCost * priceScale() * (1 - equipmentBenefits().postDiscount));
    }

    function statusRowMarkup(label, value, tone) {
      return `
        <div class="ledger-row ${tone || ""}">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `;
    }

    function scoreWealth() {
      return Math.round(gameState.cash + gameState.bank + gameState.fund - gameState.debt);
    }

    function scoreCareer() {
      return Math.round(gameState.reputation + gameState.projects.filter((p) => p.released).length * 15 + gameState.jobTier * 12);
    }

    function scoreEducation() {
      return gameState.education;
    }

    function scoreHappiness() {
      return Math.round((gameState.soul + gameState.creativity + gameState.love) / 3);
    }

    function goalValue(category) {
      if (category === "wealth") return scoreWealth();
      if (category === "career") return scoreCareer();
      if (category === "education") return scoreEducation();
      return scoreHappiness();
    }

    function goalTarget(category) {
      const base = GOAL_TARGETS[category][gameState.goalLevels[category]];
      // Happiness is a bounded quality-of-life stat, not time-accumulated — keep it fixed.
      // Accumulative goals scale closer in shorter seasons (the other half of the pacing).
      if (category === "happiness") {
        return base;
      }
      const eased = base / paceScale();
      return category === "education" ? Math.max(1, Math.round(eased)) : Math.round(eased);
    }

    function goalProgress(category) {
      return clamp(Math.round((goalValue(category) / goalTarget(category)) * 100), 0, 100);
    }

    function allGoalsMet() {
      return ["wealth", "career", "education", "happiness"].every((category) => goalProgress(category) >= 100);
    }

    function projectSlotLimit() {
      if (!gameState.filmUnlocked) {
        return 0;
      }
      return 2 + (gameState.reputation >= 80 ? 1 : 0);
    }

    function activeProjects() {
      return gameState.projects.filter((project) => !project.archived).length;
    }

    function getFocusedProject() {
      return gameState.projects.find((project) => project.id === gameState.focusedProjectId) || null;
    }

    function setFocusedProject(projectId) {
      gameState.focusedProjectId = projectId;
      render();
      return true;
    }

    function adjustStat(key, delta) {
      const bounds = key === "reputation" || key === "education" ? [0, 999] : [0, 100];
      gameState[key] = clamp(gameState[key] + delta, bounds[0], bounds[1]);
      return gameState[key];
    }

    function changeCash(delta) {
      gameState.cash = Math.round(gameState.cash + delta);
      return gameState.cash;
    }

    function note(copy, tone = "neutral") {
      gameState.ticker = copy;
      gameState.log.unshift({ copy, tone, day: gameState.day, hour: gameState.hour });
      gameState.log = gameState.log.slice(0, 18);
      return copy;
    }

    function openNotice(copy, tone = "neutral", title) {
      gameState.activeNotice = {
        id: "n" + gameState.day + "-" + gameState.hour + "-" + Math.floor(rand() * 100000),
        title: title || (tone === "good" ? t("success") : tone === "bad" ? t("fail") : t("notice")),
        copy,
        tone
      };
      if (canRender && dom) {
        if (dom.noticeTimer) {
          root.clearTimeout(dom.noticeTimer);
          dom.noticeTimer = null;
        }
      }
    }

    function flashMessage(copy, tone = "neutral") {
      note(copy, tone);
      openNotice(copy, tone);
      render();
    }

    function playSfx(kind) {
      if (!canRender || gameState.muted) {
        return;
      }
      try {
        audioContext = audioContext || new (root.AudioContext || root.webkitAudioContext)();
      } catch (_err) {
        return;
      }
      const ctx = audioContext;
      const now = ctx.currentTime;
      const bank = {
        cash: [[420, 0.08], [620, 0.06]],
        success: [[520, 0.08], [760, 0.08], [920, 0.1]],
        fail: [[180, 0.08], [130, 0.12]],
        release: [[480, 0.09], [680, 0.08], [910, 0.15], [1180, 0.11]],
        danger: [[160, 0.16], [120, 0.18]],
        travel: [[360, 0.06], [420, 0.06]],
        sleep: [[260, 0.16]]
      };
      const notes = bank[kind] || bank.cash;
      notes.forEach((pair, index) => {
        const [freq, len] = pair;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = kind === "danger" ? "square" : kind === "release" ? "triangle" : "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, now + index * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.11, now + index * 0.08 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.08 + len);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + index * 0.08);
        osc.stop(now + index * 0.08 + len + 0.02);
      });
    }

    function ensureTime(hours) {
      return gameState.hour + hours <= 23;
    }

    function spendHours(hours, reason) {
      if (!ensureTime(hours)) {
        flashMessage(localize({
          he: "היום קצר מדי לזה. תישן/י קודם.",
          en: "The day is too short for that. Sleep first."
        }), "bad");
        return false;
      }
      gameState.hour += hours;
      if (reason) {
        note(reason);
      }
      return true;
    }

    function distanceBetween(city, fromId, toId) {
      const ring = visibleBuildings(city);
      const fromIndex = ring.indexOf(fromId);
      const toIndex = ring.indexOf(toId);
      if (fromIndex < 0 || toIndex < 0) {
        return 0;
      }
      const raw = Math.abs(fromIndex - toIndex);
      return Math.min(raw, ring.length - raw);
    }

    function goToBuilding(id) {
      const city = getCity();
      const ring = visibleBuildings(city);
      if (!ring.includes(id)) {
        flashMessage(localize({
          he: "הבניין לא בעיר הזו כרגע.",
          en: "That building is not in this city right now."
        }), "bad");
        return false;
      }
      const distance = distanceBetween(city, gameState.currentBuilding, id);
      if (distance > 0 && !spendHours(distance, t("travelCost", { hours: distance }))) {
        return false;
      }
      gameState.currentBuilding = id;
      gameState.travelFlash = true;
      if (!gameState.buildingVisits) gameState.buildingVisits = {};
      gameState.buildingVisits[city.id + ":" + id] = true;
      playSfx(distance > 0 ? "travel" : "cash");
      render();
      root.setTimeout(() => {
        gameState.travelFlash = false;
        render();
      }, 900);
      return true;
    }

    function flyTo(cityId) {
      if (cityId === gameState.city) {
        return true;
      }
      const target = getCity(cityId);
      if (!target) {
        return false;
      }
      const cost = flightCost(cityId);
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק כסף לכרטיס. השמיים שמורים לעשירים ולמלווים בריבית.",
          en: "Not enough cash for a ticket. The skies belong to the rich and the predatory."
        }), "bad");
        return false;
      }
      if (!spendHours(3, t("flyCost", { hours: 3, cost }))) {
        return false;
      }
      changeCash(-cost);
      gameState.city = cityId;
      gameState.currentBuilding = visibleBuildings(target)[0] || "home";
      flashMessage(localize({
        he: "נחתת ב" + localize(target.name) + ".",
        en: "You landed in " + localize(target.name) + "."
      }), "good");
      playSfx("travel");
      updateDailySystems();
      render();
      return true;
    }

    function getJob(jobId) {
      return JOBS.find((job) => job.id === jobId) || null;
    }

    function applyJob(jobId) {
      const job = getJob(jobId);
      if (!job) {
        return false;
      }
      const missing =
        gameState.education < job.req.education ||
        gameState.wardrobeTier < job.req.wardrobe ||
        gameState.experience < job.req.experience ||
        gameState.reputation < job.req.reputation;
      if (missing) {
        flashMessage(localize(job.reject), "bad");
        playSfx("fail");
        spendHours(1, localize({
          he: "בזבזת שעה על טופס ודחייה מנומסת.",
          en: "You burned an hour on paperwork and polite rejection."
        }));
        render();
        return false;
      }
      if (!spendHours(1, localize({
        he: "ראיון קצר, מבט חודר, לחיצת יד מזיעה.",
        en: "Short interview, cold stare, sweaty handshake."
      }))) {
        return false;
      }
      gameState.jobId = job.id;
      gameState.jobTier = job.tier;
      adjustStat("reputation", 1);
      flashMessage(localize({
        he: "התקבלת: " + localize(job.title),
        en: "Hired: " + localize(job.title)
      }), "good");
      playSfx("success");
      updateUnlocks();
      saveGame();
      return true;
    }

    function degradeWardrobe(amount) {
      if (!gameState.wardrobeTier) {
        return;
      }
      gameState.wardrobeWear -= amount;
      if (gameState.wardrobeWear <= 0) {
        gameState.wardrobeTier = Math.max(0, gameState.wardrobeTier - 1);
        gameState.wardrobeWear = gameState.wardrobeTier ? 100 : 0;
        flashMessage(t("wardrobeWorn"), "bad");
      }
    }

    function workShift(hours = 4) {
      const job = getJob(gameState.jobId);
      if (!job) {
        flashMessage(localize({
          he: "צריך קודם עבודה. הקונספט של משכורת בנוי על זה.",
          en: "You need a job first. Salary depends on that concept."
        }), "bad");
        return false;
      }
      if (![4, 6, 8].includes(hours)) {
        hours = 4;
      }
      if (!spendHours(hours, t("workShift", { hours }))) {
        return false;
      }
      const pay = Math.round(job.wage * hours * economyProfile().wages * paceScale());
      changeCash(pay);
      gameState.experience += Math.round(job.exp * (hours / 4));
      adjustStat("reputation", job.rep);
      adjustStat("soul", hours >= 8 ? -3 : -1);
      adjustStat("creativity", -1);
      degradeWardrobe(hours * 6 + job.tier * 2);
      flashMessage(localize({
        he: "משמרת הסתיימה: +" + formatMoney(pay),
        en: "Shift complete: +" + formatMoney(pay)
      }), "good");
      playSfx("cash");
      updateUnlocks();
      saveGame();
      return true;
    }

    function switchHousing(housingId) {
      const item = HOUSING[housingId];
      if (!item) {
        return false;
      }
      if (housingId === gameState.housing) {
        return true;
      }
      if (housingId === "couch") {
        gameState.housing = "couch";
        flashMessage(localize({
          he: "חזרת לספה. היא לא התגעגעה.",
          en: "Back to the couch. It did not miss you."
        }), "bad");
        render();
        return true;
      }
      const entry = Math.round(item.rent * gameState.rentMultiplier);
      if (gameState.cash < entry) {
        flashMessage(localize({
          he: "אין לך מספיק בשביל שכר הדירה הראשון.",
          en: "You cannot cover the first rent."
        }), "bad");
        return false;
      }
      changeCash(-entry);
      gameState.housing = housingId;
      flashMessage(localize({
        he: "עברת ל" + localize(item.name) + ".",
        en: "Moved into " + localize(item.name) + "."
      }), "good");
      playSfx("success");
      saveGame();
      return true;
    }

    function buyWardrobe(tier) {
      const item = WARDROBES.find((entry) => entry.tier === Number(tier));
      if (!item) {
        return false;
      }
      if (gameState.housing === "couch" && item.tier > 1) {
        flashMessage(localize({
          he: "אין לך ארון. אי אפשר לנהל מלתחה מפוארת על יד כרית של מישהו אחר.",
          en: "You do not own a closet. Luxury wardrobe management from someone else's pillow is not viable."
        }), "bad");
        return false;
      }
      const cost = Math.round(item.price * priceScale());
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "אין מספיק כסף לבד שנראה אמין.",
          en: "Not enough cash for believable fabric."
        }), "bad");
        return false;
      }
      changeCash(-cost);
      gameState.wardrobeTier = item.tier;
      gameState.wardrobeWear = 100;
      flashMessage(localize({
        he: "המלתחה עלתה לדרגה " + item.tier + ".",
        en: "Wardrobe upgraded to tier " + item.tier + "."
      }), "good");
      playSfx("cash");
      saveGame();
      render();
      return true;
    }

    function attendClass(courseId = "night") {
      const course = COURSES.find((entry) => entry.id === courseId) || COURSES[0];
      const cost = Math.round(course.cost * priceScale() * modifierMultiplier("course"));
      if (gameState.cash < cost) {
        flashMessage(localize({
          he: "הקורס לא מקבל הבטחות עתידיות במקום כסף.",
          en: "The school does not accept future promises instead of money."
        }), "bad");
        return false;
      }
      if (!spendHours(course.hours, localize(course.name))) {
        return false;
      }
      changeCash(-cost);
      gameState.educationCredits += course.credits * paceScale() * modifierMultiplier("courseCredits");
      adjustStat("creativity", course.creativity);
      adjustStat("soul", course.soul);
      while (gameState.educationCredits >= (gameState.education + 1) * 2) {
        gameState.education += 1;
        adjustStat("reputation", 2);
        flashMessage(localize({
          he: "עלית ברמת ההשכלה. עכשיו אתה נשמע יקר יותר.",
          en: "Education level up. You now sound more expensive."
        }), "good");
      }
      playSfx("success");
      updateUnlocks();
      saveGame();
      return true;
    }

    function takeGig(gigId) {
      const gig = GIGS.find((entry) => entry.id === gigId);
      if (!gig) {
        return false;
      }
      const ledgerKey = gameState.day + ":" + gigId;
      if (gameState.dailyGigLedger[ledgerKey]) {
        flashMessage(localize({
          he: "את הגיג הזה כבר סחטת היום.",
          en: "You already squeezed that gig today."
        }), "bad");
        return false;
      }
      if (!spendHours(gig.hours, localize(gig.name))) {
        return false;
      }
      gameState.dailyGigLedger[ledgerKey] = true;
      changeCash(gig.pay);
      adjustStat("creativity", gig.creativity);
      adjustStat("soul", gig.soul);
      adjustStat("reputation", gig.rep);
      flashMessage(localize({
        he: "גיג נסגר: +" + formatMoney(gig.pay),
        en: "Gig closed: +" + formatMoney(gig.pay)
      }), "good");
      playSfx("cash");
      saveGame();
      return true;
    }

    // LSL-style flirt action. Free, 1h, daily-locked. Outcome biased by
    // wardrobe tier (no tier = -10%, T1 = 0, T2 = +10%, T3 = +20%) and
    // light soul cost on rejection. Tone is Larry Laffer — desperate man,
    // cynical world.
    function flirtAtCafe() {
      const ledgerKey = gameState.day + ":flirt";
      if (!gameState.dailyGigLedger) gameState.dailyGigLedger = {};
      if (gameState.dailyGigLedger[ledgerKey]) {
        flashMessage(localize({
          he: "הבריסטה כבר רואה אותך מהקפה הקודם. אל תהיה ההוא.",
          en: "The barista already pegged you from the last attempt. Don't be that guy."
        }), "bad");
        return false;
      }
      if (!spendHours(1, localize({ he: "פלרטוט במאמץ", en: "Strained flirting" }))) {
        return false;
      }
      gameState.dailyGigLedger[ledgerKey] = true;
      const wardrobeBoost = (gameState.wardrobeTier || 0) * 0.08 - 0.10; // -0.10 .. +0.14
      const rng = Math.random();
      // Buckets: viral (top 4%+boost), phone (next 25%+boost), rejection (rest)
      if (rng < 0.04 + Math.max(0, wardrobeBoost)) {
        adjustStat("reputation", 4);
        adjustStat("happiness", 3);
        adjustStat("creativity", 1);
        flashMessage(localize({
          he: "פלרטטת בקול רם. מצולם. בטיק-טוק. 14k צפיות עד הבוקר. אגדה מקומית.",
          en: "You flirted loudly. Filmed. Tiktoked. 14k views by sunrise. A local legend."
        }), "good");
        playSfx("cash");
      } else if (rng < 0.30 + wardrobeBoost) {
        adjustStat("happiness", 2);
        adjustStat("soul", 1);
        flashMessage(localize({
          he: "מספר נשמט על מפית. כתב יד של מי שלא חוזרת. עדיין — מספר.",
          en: "A number slipped onto a napkin. Handwriting of someone who won't answer. Still — a number."
        }), "good");
      } else {
        adjustStat("soul", -2);
        adjustStat("happiness", -1);
        const lines = [
          { he: "החזירה ליין-טוניק כאילו לא דיברת. הזכוכית קלטה את הרמז.", en: "She returned to her gin and tonic as if you hadn't spoken. The glass understood." },
          { he: "ענתה: 'אני בקבוצת עזרה לאחיינים של במאים'. לא הבנת אם זה כן או לא.", en: "She replied: 'I'm in a support group for directors' nephews.' You couldn't tell if it was yes or no." },
          { he: "החבר/ה שלה הגיע. בעלה גם הגיע. אתה למדת המון על מבנה משפחתי.", en: "Her partner showed up. So did her husband. You learned a lot about family structures." },
          { he: "אמרה 'אני מצלמת תיעודי על אנשים כמוך'. הסתובבת. היא לא הזיזה את המצלמה.", en: "She said 'I shoot docs about guys like you.' You turned. She didn't move the camera." }
        ];
        const line = lines[Math.floor(rng * lines.length)] || lines[0];
        flashMessage(localize(line), "bad");
        playSfx("fail");
      }
      saveGame();
      return true;
    }

    function findStoryBeat(day) {
      return STORY_BEATS.find((b) => b.day === day);
    }

    function applyStoryChoice(beatId, choiceId) {
      const beat = STORY_BEATS.find((b) => b.id === beatId);
      if (!beat) return false;
      const choice = beat.choices.find((c) => c.id === choiceId);
      if (!choice) return false;
      if (choice.requires && !choice.requires(gameState)) {
        flashMessage(localize({ he: "אין לך את הקשרים לזה.", en: "You don't have the network for this." }), "bad");
        return false;
      }
      // Single outcome OR weighted outcomes[]
      let picked = choice.outcome;
      if (!picked && Array.isArray(choice.outcomes) && choice.outcomes.length) {
        const total = choice.outcomes.reduce((s, o) => s + (o.weight || 1), 0);
        let roll = Math.random() * total;
        picked = choice.outcomes[0];
        for (const o of choice.outcomes) {
          roll -= (o.weight || 1);
          if (roll <= 0) { picked = o; break; }
        }
      }
      if (!picked) return false;
      const fx = picked.effects || {};
      if (typeof fx.cash === "number") changeCash(fx.cash);
      ["soul", "happiness", "creativity", "reputation", "love"].forEach((k) => {
        if (typeof fx[k] === "number") adjustStat(k, fx[k]);
      });
      flashMessage(localize(picked.flavor), picked.tone || "neutral");
      if (picked.sfx) playSfx(picked.sfx);
      if (!gameState.storyBeatsFired) gameState.storyBeatsFired = {};
      gameState.storyBeatsFired[beatId] = { choiceId, day: gameState.day };
      gameState.activeStoryBeat = null;
      saveGame();
      render();
      return true;
    }

    function maybeTriggerStoryBeat() {
      if (!gameState.storyBeatsFired) gameState.storyBeatsFired = {};
      const beat = findStoryBeat(gameState.day);
      if (!beat) return;
      if (gameState.storyBeatsFired[beat.id]) return;
      gameState.activeStoryBeat = beat.id;
    }

    /*
     * NPC_LINKS — undirected social ties between recurring characters.
     * When a player's relationship with one NPC moves, a fraction of
     * that delta ripples to the linked NPC (same sign — friends of
     * friends tend to align). spill is the share. Used for first-degree
     * spread only — spillover does NOT recurse to second-degree links.
     * Spillover targets are NOT marked as met (you haven't actually
     * encountered them); only their relationship counter pre-tilts.
     */
    const NPC_LINKS = [
      { a: "dani_classmate", b: "maya_barista", spill: 0.5, why: { he: "חברי לימודים מבית הספר לקולנוע ת\"א", en: "Film-school classmates in TLV" } },

      { a: "frank_set", b: "tony_loan", spill: 0.4, why: { he: "ידידי-עסקים מהשנים, ניו יורק", en: "Long-time NYC business friends" } },
      { a: "rose_legend", b: "henry_festival", spill: 0.5, why: { he: "היא חנכה אותו לפני שני עשורים", en: "She mentored him two decades ago" } },

      { a: "klaus_gear", b: "whitwell_banker", spill: 0.3, why: { he: "פדנטים גרמני-בריטי, יחס מקצועי", en: "German-British pedants, professional respect" } }
    ];

    function npcLinkPartners(npcId) {
      const partners = [];
      NPC_LINKS.forEach((link) => {
        if (link.a === npcId) partners.push(link.b);
        else if (link.b === npcId) partners.push(link.a);
      });
      return partners;
    }

    function applyNetworkSpillover(originId, deltaRel) {
      if (Math.abs(deltaRel) < 2) return; // small interactions don't ripple
      if (!gameState.npcs) gameState.npcs = {};
      NPC_LINKS.forEach((link) => {
        let target = null;
        if (link.a === originId) target = link.b;
        else if (link.b === originId) target = link.a;
        if (!target || !NPCS[target]) return;
        const spread = Math.round(deltaRel * link.spill);
        if (spread === 0) return;
        if (!gameState.npcs[target]) {
          gameState.npcs[target] = { met: false, relationship: 0, firstMet: gameState.day };
        }
        gameState.npcs[target].relationship += spread;
        // Do NOT set met=true. The player hasn't actually encountered them yet.
      });
    }

    function meetNpc(npcId, deltaRel) {
      if (!NPCS[npcId]) return;
      if (!gameState.npcs) gameState.npcs = {};
      if (!gameState.npcs[npcId]) {
        gameState.npcs[npcId] = { met: true, relationship: 0, firstMet: gameState.day };
      }
      gameState.npcs[npcId].met = true;
      gameState.npcs[npcId].relationship += (deltaRel || 0);
      gameState.npcs[npcId].lastSeen = gameState.day;
      applyNetworkSpillover(npcId, deltaRel || 0);
    }

    /*
     * Relationship bucket: rel >= 5 friendly, <= -5 hostile, else neutral.
     * Used to bend outcome weights and surface UI badges. Card declares
     * npcInfluence: { id } at the top level; outcomes inherit the bend
     * based on their tone (good outcomes amplify with friends, bad with
     * enemies). Neutral-toned outcomes are not affected.
     */
    function npcRelBucket(npcId) {
      if (!gameState.npcs || !gameState.npcs[npcId]) return "neutral";
      const rel = gameState.npcs[npcId].relationship | 0;
      if (rel >= 5) return "friendly";
      if (rel <= -5) return "hostile";
      return "neutral";
    }

    /*
     * outcomeAllowed — relGate filter.
     * outcome.relGate = { id, min, max } restricts an outcome to a
     * relationship range with the named NPC. min:5 means rel must be
     * >= 5 (friend bonus). max:-5 means rel must be <= -5 (enemy
     * penalty). Used before weight resolution to fully hide gated
     * outcomes from RNG until the relationship qualifies.
     */
    function outcomeAllowed(outcome) {
      if (!outcome.relGate) return true;
      const gate = outcome.relGate;
      const npc = gameState.npcs && gameState.npcs[gate.id];
      const rel = npc ? (npc.relationship | 0) : 0;
      if (typeof gate.min === "number" && rel < gate.min) return false;
      if (typeof gate.max === "number" && rel > gate.max) return false;
      return true;
    }

    function resolveOutcomeWeight(outcome, card) {
      let w = outcome.weight || 1;
      if (card.npcInfluence && card.npcInfluence.id) {
        const bucket = npcRelBucket(card.npcInfluence.id);
        if (bucket === "friendly") {
          if (outcome.tone === "good") w *= 2;
          else if (outcome.tone === "bad") w *= 0.5;
        } else if (bucket === "hostile") {
          if (outcome.tone === "good") w *= 0.5;
          else if (outcome.tone === "bad") w *= 2;
        }
      }
      return w;
    }

    function npcInfluenceBadge(cardId) {
      const card = SCENE_CARDS[cardId];
      if (!card || !card.npcInfluence || !card.npcInfluence.id) return "";
      const bucket = npcRelBucket(card.npcInfluence.id);
      if (bucket === "friendly") return " • 🤝";
      if (bucket === "hostile") return " • ❄️";
      return "";
    }
