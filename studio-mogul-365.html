<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>kobi life.</title>
  <style>
    :root {
      --paper: #f5e8ce;
      --paper-2: #ebd5ac;
      --ink: #27180f;
      --accent: #b44f2a;
      --accent-2: #19475d;
      --glow: #ffd171;
      --sky-a: #eae2d3;
      --sky-b: #d8ccb8;
      --sky-c: #cfc3b1;
      --panel: rgba(255, 255, 255, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.84);
      --shadow: rgba(25, 16, 12, 0.12);
      --good: #23775f;
      --bad: #a53131;
      --soft: rgba(39, 24, 15, 0.08);
      --street: #9e8c72;
      --street-edge: #786850;
      --marquee: #fff7cf;
      --night: rgba(8, 14, 28, 0.74);
      --font-title: "Trebuchet MS", "Arial", sans-serif;
      --font-body: "Verdana", "Arial", sans-serif;
      --hud-height: 94px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: linear-gradient(180deg, #f6eedf, #ece4d6);
      color: var(--ink);
      font-family: var(--font-body);
      overflow: hidden;
    }

    body {
      position: relative;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .hidden {
      display: none !important;
    }

    #app {
      height: 100vh;
      display: grid;
      grid-template-rows: var(--hud-height) minmax(0, 1fr);
      overflow: hidden;
    }

    .hud {
      position: relative;
      z-index: 40;
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(251, 246, 237, 0.96);
      border-bottom: 1px solid rgba(39, 24, 15, 0.08);
    }

    .clock-box,
    .status-box,
    .controls-box {
      background: var(--panel);
      border: 1px solid rgba(39, 24, 15, 0.08);
      border-radius: 18px;
      box-shadow: none;
      padding: 8px 10px;
    }

    .clock-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock-face {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
    }

    .clock-face .bg {
      stroke: rgba(39, 24, 15, 0.14);
      stroke-width: 9;
      fill: none;
    }

    .clock-face .fg {
      stroke: var(--accent);
      stroke-width: 10;
      stroke-linecap: round;
      fill: none;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 0.4s ease;
    }

    .clock-time {
      font-family: var(--font-title);
      font-size: clamp(1.04rem, 1.55vw, 1.34rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .clock-sub {
      font-size: 0.77rem;
      opacity: 0.72;
      margin-top: 2px;
    }

    .status-box {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .metric {
      min-width: 0;
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(39, 24, 15, 0.08);
    }

    .metric-label {
      font-size: 0.67rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.62;
    }

    .metric-value {
      font-family: var(--font-title);
      font-size: clamp(0.86rem, 1.2vw, 1.02rem);
      font-weight: 700;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls-box {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: nowrap;
    }

    .icon-btn {
      min-width: 38px;
      min-height: 38px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(39, 24, 15, 0.1);
      box-shadow: none;
      transition: transform 0.15s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      grid-template-areas: "side board";
      direction: ltr;
      gap: 12px;
      padding: 12px;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .board-stage {
      grid-area: board;
      direction: rtl;
      position: relative;
      min-height: 0;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(39, 24, 15, 0.1);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0)),
        linear-gradient(180deg, var(--city-sky-a), var(--city-sky-b) 60%, var(--city-sky-c));
    }

    .city-skyline,
    .board-ground {
      display: none;
    }

    .skyline-bar {
      display: none;
    }

    .board-caption {
      position: absolute;
      inset: 12px 12px auto 12px;
      z-index: 3;
      display: grid;
      gap: 0;
      pointer-events: none;
    }

    .city-title {
      background: rgba(255, 255, 255, 0.76);
      border-radius: 16px;
      padding: 10px 12px;
      border: 1px solid rgba(39, 24, 15, 0.08);
      max-width: none;
    }

    .city-title .board-meta {
      margin: 4px 0 0;
      font-size: 0.74rem;
      opacity: 0.62;
    }

    .city-title .board-hint {
      margin: 6px 0 0;
      font-size: 0.82rem;
      opacity: 0.9;
      white-space: normal;
      line-height: 1.32;
    }

    .city-title h1 {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(1.08rem, 1.7vw, 1.48rem);
      line-height: 1.02;
    }

    .city-title p {
      margin: 4px 0 0;
      opacity: 0.78;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ticker {
      display: none;
    }

    .board-ring {
      position: absolute;
      inset: 86px 18px 18px 18px;
      z-index: 2;
    }

    .street-loop {
      position: absolute;
      inset: 10% 8%;
      border-radius: 50%;
      background: transparent;
      border: 10px solid rgba(114, 91, 62, 0.34);
    }

    .street-loop::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px dashed rgba(114, 91, 62, 0.28);
    }

    .center-plaza {
      display: none;
    }

    .center-plaza strong {
      display: block;
      font-family: var(--font-title);
      font-size: clamp(0.92rem, 1.3vw, 1.08rem);
    }

    .center-plaza span {
      display: block;
      font-size: 0.76rem;
      opacity: 0.8;
      margin-top: 2px;
    }

    .building {
      position: absolute;
      width: clamp(62px, 7vw, 86px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      z-index: 4;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .building:hover {
      transform: translate(-50%, -52%);
      filter: brightness(1.02);
    }

    .building.selected {
      z-index: 5;
    }

    .building-card {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent 38%),
        linear-gradient(180deg, var(--b1, #c97f5c), var(--b2, #7e4a35));
      border: 1px solid rgba(39, 24, 15, 0.12);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .roof,
    .facade,
    .building-tag,
    .windows,
    .door,
    .window {
      display: none;
    }

    .sign {
      position: relative;
      z-index: 2;
      width: calc(100% - 14px);
      height: calc(100% - 14px);
      background: rgba(255, 255, 255, 0.86);
      border-radius: 12px;
      padding: 8px 6px;
      text-align: center;
      font-family: var(--font-title);
      font-size: clamp(0.64rem, 0.82vw, 0.78rem);
      line-height: 1.18;
      display: grid;
      place-items: center;
      border: 1px solid rgba(39, 24, 15, 0.12);
    }

    .building.target .sign {
      animation: blinkSign 1s infinite alternate;
    }

    .avatar {
      position: absolute;
      width: 40px;
      height: 54px;
      transform: translate(-50%, -50%);
      z-index: 7;
      transition: left 0.95s cubic-bezier(.23,.91,.23,.99), top 0.95s cubic-bezier(.23,.91,.23,.99);
      pointer-events: none;
    }

    .avatar .shadow {
      position: absolute;
      inset: auto 8px 2px 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.22);
      filter: blur(4px);
    }

    .avatar .body {
      position: absolute;
      inset: 6px 8px 8px 8px;
      animation: bob 1s ease-in-out infinite;
    }

    .avatar .head {
      width: 16px;
      height: 16px;
      margin: 0 auto;
      border-radius: 50%;
      background: linear-gradient(180deg, #f8d8a2, #ecbd73);
      border: 1px solid rgba(39,24,15,0.18);
      position: relative;
      z-index: 2;
    }

    .avatar .head::before {
      content: "";
      position: absolute;
      inset: -2px 2px auto 2px;
      height: 7px;
      border-radius: 8px 8px 3px 3px;
      background: linear-gradient(180deg, #312018, #5e382b);
    }

    .avatar .torso {
      width: 20px;
      height: 20px;
      margin: -1px auto 0;
      border-radius: 8px 8px 6px 6px;
      background: linear-gradient(180deg, var(--accent-2), #122330);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .avatar .legs {
      width: 18px;
      height: 12px;
      margin: 2px auto 0;
      position: relative;
      animation: walk 0.7s linear infinite;
      transform-origin: top center;
    }

    .avatar .legs::before,
    .avatar .legs::after {
      content: "";
      position: absolute;
      top: 0;
      width: 5px;
      height: 12px;
      border-radius: 4px;
      background: #2b1c17;
    }

    .avatar .legs::before {
      left: 3px;
    }

    .avatar .legs::after {
      right: 3px;
    }

    .side-panel {
      grid-area: side;
      direction: rtl;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 10px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }

    .panel {
      background: var(--panel-strong);
      border-radius: 18px;
      border: 1px solid rgba(39, 24, 15, 0.08);
      box-shadow: none;
      padding: 12px;
    }

    .panel h2,
    .panel h3 {
      margin: 0 0 8px;
      font-family: var(--font-title);
      line-height: 1.02;
    }

    .goal-list,
    .stats-list,
    .project-list,
    .score-list {
      display: grid;
      gap: 8px;
    }

    .goal-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .goal-card,
    .project-card,
    .score-card {
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(39, 24, 15, 0.08);
      border-radius: 14px;
      padding: 8px 10px;
    }

    .goal-top,
    .project-top,
    .score-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 0.82rem;
    }

    .goal-bar {
      margin-top: 6px;
      height: 8px;
      border-radius: 999px;
      background: rgba(39,24,15,0.1);
      overflow: hidden;
    }

    .goal-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #ebad53);
      transition: width 0.4s ease;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .stat-chip {
      padding: 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.42);
      text-align: center;
      border: 1px solid rgba(39,24,15,0.08);
      font-size: 0.76rem;
    }

    .stat-chip strong {
      display: block;
      font-family: var(--font-title);
      font-size: 0.98rem;
      margin-top: 3px;
    }

    .project-card {
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .project-card:hover {
      transform: translateY(-1px);
    }

    .project-card.focused {
      border-color: rgba(180, 79, 42, 0.46);
      box-shadow: inset 0 0 0 2px rgba(180, 79, 42, 0.14);
    }

    .project-list {
      max-height: 150px;
      overflow: auto;
      padding-inline-end: 2px;
    }

    .project-meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .pill {
      background: rgba(35, 23, 21, 0.82);
      color: #fef1cb;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 0.68rem;
    }

    .highscores {
      display: none;
    }

    .marquee {
      background:
        radial-gradient(circle at center, rgba(255, 230, 153, 0.58), rgba(255, 230, 153, 0) 68%),
        linear-gradient(180deg, #a73426, #642017);
      color: var(--marquee);
      border-radius: 16px;
      padding: 12px;
      border: 1px solid rgba(255,245,212,0.14);
      min-height: 84px;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }

    .marquee::before {
      display: none;
    }

    .marquee h3 {
      margin: 0;
      position: relative;
      z-index: 1;
      font-size: clamp(0.95rem, 1.3vw, 1.08rem);
    }

    .marquee p {
      margin: 6px 0 0;
      position: relative;
      z-index: 1;
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .marquee.fireworks::after,
    .marquee.flop::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
    }

    .marquee.fireworks::after {
      background:
        radial-gradient(circle at 25% 28%, rgba(255,255,255,0.9), transparent 10%),
        radial-gradient(circle at 72% 18%, rgba(255,218,126,0.9), transparent 11%),
        radial-gradient(circle at 61% 55%, rgba(255,99,71,0.76), transparent 12%);
      animation: sparkle 1.2s linear infinite;
    }

    .marquee.flop::after {
      background:
        linear-gradient(180deg, transparent 0, rgba(15,10,9,0.12) 20%, rgba(15,10,9,0.4)),
        radial-gradient(circle at 50% 76%, rgba(23,15,12,0.4), transparent 30%);
    }

    .action-groups {
      display: grid;
      gap: 12px;
    }

    .action-group {
      background: rgba(255,255,255,0.3);
      border: 1px solid rgba(39,24,15,0.08);
      border-radius: 16px;
      padding: 10px;
    }

    .action-group h3 {
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .action-buttons,
    .offer-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .action-btn,
    .offer-card,
    .start-card button {
      width: 100%;
      text-align: start;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.56), rgba(255,255,255,0.18)),
        linear-gradient(180deg, #dfe7d8, #c8d4bf);
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(39,24,15,0.1);
      box-shadow: none;
      transition: transform 0.15s ease;
    }

    .action-btn:hover,
    .offer-card:hover,
    .start-card button:hover {
      transform: translateY(-1px);
    }

    .action-btn .topline,
    .offer-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-family: var(--font-title);
      font-size: 0.84rem;
    }

    .action-btn .subline,
    .offer-copy {
      margin-top: 4px;
      opacity: 0.78;
      font-size: 0.76rem;
      line-height: 1.34;
    }

    .offer-card {
      background: rgba(255,255,255,0.88);
      cursor: default;
    }

    .offer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .mini-btn {
      background: rgba(34, 25, 22, 0.88);
      color: #f9efcf;
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 0.72rem;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mini-btn.secondary {
      background: rgba(255,255,255,0.64);
      color: var(--ink);
      border: 1px solid rgba(39,24,15,0.08);
    }

    .place-copy {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.4;
      opacity: 0.86;
    }

    .hint-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(180, 79, 42, 0.08);
      border: 1px solid rgba(180, 79, 42, 0.14);
      font-size: 0.8rem;
      line-height: 1.34;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .quick-item {
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(39,24,15,0.08);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 0.74rem;
    }

    .quick-item strong {
      display: block;
      margin-top: 3px;
      font-family: var(--font-title);
      font-size: 0.94rem;
    }

    .goal-rows {
      display: grid;
      gap: 8px;
    }

    .goal-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(39,24,15,0.08);
      font-size: 0.8rem;
    }

    .goal-row strong {
      font-family: var(--font-title);
      font-size: 0.92rem;
    }

    .goal-row div {
      display: grid;
      gap: 2px;
      text-align: end;
    }

    .goal-row span:last-child {
      opacity: 0.62;
      font-size: 0.72rem;
    }

    .section-label {
      margin: 0 0 8px;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .focus-empty {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(39,24,15,0.08);
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .clerk-wrap {
      width: min(240px, 100%);
      aspect-ratio: 0.8;
      display: grid;
      place-items: center;
      position: relative;
    }

    .clerk-nameplate {
      position: absolute;
      inset: auto 12px 12px 12px;
      background: rgba(23, 18, 16, 0.82);
      color: #fff2cc;
      border-radius: 12px;
      padding: 8px 10px;
      text-align: center;
      font-size: 0.76rem;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(25, 20, 18, 0.54);
      display: grid;
      place-items: center;
      padding: 12px;
      backdrop-filter: blur(6px);
    }

    .start-card {
      width: min(680px, 94vw);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent 36%),
        linear-gradient(180deg, #f6e8cf, #d8bea1);
      color: #1d120f;
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(39,24,15,0.08);
      box-shadow: 0 22px 40px -32px rgba(0,0,0,0.7);
    }

    .start-card h1 {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(1.72rem, 3.2vw, 2.28rem);
      line-height: 0.98;
    }

    .start-card p {
      opacity: 0.82;
      max-width: 58ch;
      line-height: 1.4;
      font-size: 0.88rem;
    }

    .start-card .subtitle {
      margin: 8px 0 0;
      font-weight: 700;
      opacity: 0.92;
    }

    .start-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 0.84rem;
      opacity: 0.78;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid rgba(39,24,15,0.14);
      background: rgba(255,255,255,0.9);
      padding: 11px 12px;
      border-radius: 12px;
    }

    .goal-picks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .goal-picks .field {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(39,24,15,0.08);
    }

    .start-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px dashed rgba(39, 24, 15, 0.16);
    }

    .start-actions-primary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .start-actions-primary button {
      width: 100%;
      padding: 14px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      text-align: center;
    }

    .start-actions-secondary {
      display: flex;
      justify-content: center;
    }

    .lead-btn {
      min-width: 0;
      background: linear-gradient(180deg, #2f5f52, #173c34);
      color: #fef0ca;
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: none;
    }

    .float-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 120;
    }

    .floaty {
      position: absolute;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(24, 19, 17, 0.86);
      color: #fff4cf;
      font-family: var(--font-title);
      font-size: 0.92rem;
      animation: floatUp 1.8s ease forwards;
      white-space: nowrap;
    }

    .floaty.good {
      background: rgba(18, 90, 65, 0.9);
    }

    .floaty.bad {
      background: rgba(133, 34, 34, 0.92);
    }

    .night-veil {
      position: fixed;
      inset: 0;
      z-index: 70;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(13, 20, 38, 0.08), var(--night));
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .night-veil.active {
      opacity: 1;
    }

    .win-loss {
      position: fixed;
      inset: 0;
      z-index: 95;
      background: rgba(10, 8, 10, 0.72);
      display: grid;
      place-items: center;
      padding: 18px;
      backdrop-filter: blur(7px);
    }

    .win-card {
      width: min(680px, 94vw);
      background: linear-gradient(180deg, #f8ddb1, #bb6f46);
      color: #1f1410;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 22px 40px -32px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }

    .win-card h2 {
      margin: 0;
      font-size: clamp(1.64rem, 2.6vw, 2.1rem);
    }

    .win-card p {
      line-height: 1.45;
      opacity: 0.86;
      font-size: 0.88rem;
    }

    @keyframes blinkSign {
      from { box-shadow: 0 0 0 rgba(255, 209, 113, 0); }
      to { box-shadow: 0 0 0 5px rgba(255, 209, 113, 0.16); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes walk {
      0%, 100% { transform: rotate(4deg); }
      50% { transform: rotate(-4deg); }
    }

    @keyframes floatUp {
      0% { transform: translate3d(0, 0, 0) scale(0.92); opacity: 0; }
      14% { opacity: 1; transform: translate3d(0, -10px, 0) scale(1); }
      100% { transform: translate3d(0, -68px, 0) scale(1.04); opacity: 0; }
    }

    @keyframes sparkle {
      0% { transform: scale(0.95); opacity: 0.35; }
      50% { transform: scale(1.04); opacity: 0.72; }
      100% { transform: scale(0.95); opacity: 0.35; }
    }

    :root {
      --paper: #c0c0c0;
      --paper-2: #c0c0c0;
      --ink: #000000;
      --accent: #000080;
      --accent-2: #000080;
      --sky-a: #c0c0c0;
      --sky-b: #c0c0c0;
      --sky-c: #c0c0c0;
      --panel: #c0c0c0;
      --panel-strong: #c0c0c0;
      --shadow: rgba(0, 0, 0, 0);
      --soft: #808080;
      --street: #9a9a9a;
      --street-edge: #6f6f6f;
      --marquee: #000000;
      --font-title: "Tahoma", "MS Sans Serif", "Verdana", sans-serif;
      --font-body: "Tahoma", "MS Sans Serif", "Verdana", sans-serif;
      --hud-height: 92px;
      --win-bg: #008080;
      --win-face: #c0c0c0;
      --win-light: #ffffff;
      --win-mid: #dfdfdf;
      --win-dark: #808080;
      --win-black: #000000;
      --win-blue: #000080;
    }

    html, body {
      background: var(--win-face);
      color: var(--win-black);
      font-size: 14px;
    }

    #app {
      max-width: none;
      margin: 0;
      height: 100vh;
      background: var(--win-face);
      box-shadow: none;
    }

    body:fullscreen #app,
    body:-webkit-full-screen #app {
      height: 100vh;
    }

    /* Win95 dialog/alert overlays — deepen the theme on modal windows */
    .start-screen,
    .win-loss,
    .status-window,
    .incident-window {
      background: var(--win-face);
      color: var(--win-black);
      font-family: var(--font-body);
    }
    .start-screen .panel,
    .win-loss .panel,
    .status-window .panel,
    .incident-window .panel,
    .start-screen .card,
    .win-loss .card,
    .status-window .card,
    .incident-window .card {
      background: var(--win-face);
      border: 0;
      box-shadow:
        inset -1px -1px var(--win-black),
        inset 1px 1px var(--win-light),
        inset -2px -2px var(--win-dark),
        inset 2px 2px var(--win-mid);
      border-radius: 0;
    }
    /* Win95 scrollbar */
    *::-webkit-scrollbar { width: 16px; height: 16px; }
    *::-webkit-scrollbar-track {
      background: var(--win-face);
      box-shadow:
        inset 1px 1px var(--win-dark),
        inset -1px -1px var(--win-light);
    }
    *::-webkit-scrollbar-thumb {
      background: var(--win-face);
      box-shadow:
        inset -1px -1px var(--win-black),
        inset 1px 1px var(--win-light),
        inset -2px -2px var(--win-dark),
        inset 2px 2px var(--win-mid);
    }
    /* Fullscreen toggle button — sits in the HUD */
    .fs-btn {
      background: var(--win-face);
      color: var(--win-black);
      padding: 4px 10px;
      font-family: var(--font-body);
      font-size: 12px;
      box-shadow:
        inset -1px -1px var(--win-black),
        inset 1px 1px var(--win-light),
        inset -2px -2px var(--win-dark),
        inset 2px 2px var(--win-mid);
      border: 0;
      border-radius: 0;
    }
    .fs-btn:active {
      box-shadow:
        inset 1px 1px var(--win-black),
        inset -1px -1px var(--win-light),
        inset 2px 2px var(--win-dark),
        inset -2px -2px var(--win-mid);
    }

    .hud {
      background: var(--win-face);
      border-bottom: 0;
      padding: 28px 6px 6px;
      gap: 6px;
    }

    .hud::before {
      content: var(--window-title, "kobi life.");
      position: absolute;
      inset: 4px 4px auto 4px;
      height: 18px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      color: #ffffff;
      font-weight: 700;
      font-size: 12px;
      background: linear-gradient(90deg, #000080, #1084d0);
    }

    .clock-box,
    .status-box,
    .controls-box,
    .panel,
    .action-group,
    .action-btn,
    .offer-card,
    .project-card,
    .score-card,
    .goal-card,
    .mini-btn,
    .lead-btn,
    .icon-btn,
    .start-card button {
      border-radius: 0;
      border: 0;
      background: var(--win-face);
      color: var(--win-black);
      box-shadow:
        inset -1px -1px var(--win-black),
        inset 1px 1px var(--win-light),
        inset -2px -2px var(--win-dark),
        inset 2px 2px var(--win-mid);
    }

    .action-btn,
    .start-card button {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.56), rgba(255,255,255,0.18)),
        linear-gradient(180deg, #dfe7d8, #c8d4bf);
    }

    .metric,
    .quick-item,
    .stat-chip,
    .goal-row,
    .place-copy,
    .hint-box,
    .city-title,
    .marquee,
    .field input,
    .field select,
    .board-stage {
      border-radius: 0;
      border: 0;
      background: #ffffff;
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark),
        inset -2px -2px var(--win-mid),
        inset 2px 2px var(--win-black);
    }

    .board-stage {
      background: #bdbdbd;
    }

    .board-caption {
      inset: 8px 8px auto 8px;
    }

    .city-title {
      padding: 8px 10px;
    }

    .city-title h1 {
      font-size: 18px;
    }

    .city-title .board-meta,
    .city-title .board-hint,
    .clock-sub,
    .metric-label,
    .section-label {
      opacity: 1;
      color: #222;
    }

    .clock-time,
    .metric-value,
    .goal-row strong,
    .stat-chip strong,
    .quick-item strong {
      font-family: var(--font-body);
      font-weight: 700;
    }

    .controls-box {
      background: transparent;
      box-shadow: none;
      padding: 0;
    }

    .sleep-btn {
      min-width: 76px;
      padding-inline: 10px;
      font-weight: 700;
    }

    .layout {
      gap: 6px;
      padding: 6px;
    }

    .side-panel {
      gap: 6px;
    }

    .panel {
      padding: 8px;
    }

    .panel h2,
    .panel h3 {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .lead-btn {
      color: #008c2a;
      font-weight: 700;
    }

    .goal-row,
    .metric,
    .quick-item,
    .stat-chip,
    .project-card,
    .score-card,
    .goal-card,
    .action-btn,
    .offer-card {
      padding: 8px;
    }

    .place-copy,
    .hint-box {
      padding: 8px 10px;
    }

    .hint-box {
      background: #ffffe1;
    }

    .board-ring {
      inset: 78px 12px 12px 12px;
    }

    .street-loop {
      border-width: 4px;
      border-color: #7f7f7f;
      background:
        linear-gradient(180deg, #d4d4d4, #bdbdbd);
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark);
    }

    .street-loop::after {
      border-color: #9a9a9a;
      inset: 3px;
    }

    .building {
      width: clamp(74px, 8vw, 96px);
    }

    .building-card {
      border-radius: 0;
      border: 0;
      background:
        linear-gradient(180deg, var(--b1) 0 9px, var(--win-face) 9px 100%);
      box-shadow:
        inset -1px -1px var(--win-black),
        inset 1px 1px var(--win-light),
        inset -2px -2px var(--win-dark),
        inset 2px 2px var(--win-mid);
    }

    .sign {
      width: calc(100% - 8px);
      height: calc(100% - 8px);
      padding: 12px 6px 6px;
      border: 0;
      border-radius: 0;
      background: transparent;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      box-shadow: none;
    }

    .building.selected .building-card {
      background:
        linear-gradient(180deg, #000080 0 9px, var(--win-face) 9px 100%);
    }

    .building.selected .sign {
      color: #000080;
    }

    .avatar {
      width: 34px;
      height: 46px;
    }

    .avatar .torso {
      background: #000080;
    }

    .project-card.focused {
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark),
        inset -2px -2px var(--win-mid),
        inset 2px 2px var(--win-black);
      background: #dfefff;
    }

    .pill {
      border-radius: 0;
      background: #000080;
      color: #ffffff;
      padding: 2px 6px;
    }

    .marquee {
      background: #ffffff;
      color: #000000;
      min-height: 68px;
    }

    .marquee.fireworks::after,
    .marquee.flop::after {
      display: none;
    }

    .mini-btn.secondary {
      background: var(--win-face);
    }

    .start-screen,
    .win-loss {
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: none;
    }

    .start-card,
    .win-card {
      border-radius: 0;
      border: 0;
      background: var(--win-face);
      color: #000000;
      box-shadow:
        inset -1px -1px var(--win-black),
        inset 1px 1px var(--win-light),
        inset -2px -2px var(--win-dark),
        inset 2px 2px var(--win-mid);
    }

    .start-card h1,
    .win-card h2 {
      font-size: 22px;
    }

    @media (max-width: 1060px) {
      :root {
        --hud-height: auto;
      }

      html, body {
        overflow: auto;
      }

      #app {
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto auto;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-areas: "side" "board";
        height: auto;
        overflow: visible;
      }

      .board-stage {
        min-height: 66vh;
      }

      .side-panel {
        height: auto;
        overflow: visible;
      }
    }

    @media (max-width: 760px) {
      .status-box {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .goal-list,
      .goal-picks,
      .action-buttons,
      .offer-list,
      .start-grid {
        grid-template-columns: 1fr;
      }

      .layout,
      .hud {
        padding: 10px;
      }

      .board-ring {
        inset: 96px 10px 10px 10px;
      }

      .building {
        width: clamp(60px, 16vw, 82px);
      }

      .center-plaza {
        inset: 41% 32%;
      }
    }

    :root {
      --hud-height: 74px;
    }

    .hud {
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 4px;
      padding: 24px 6px 6px;
    }

    .status-box.hud-summary {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
      padding: 0;
      background: transparent;
      box-shadow: none;
    }

    .status-box.hud-summary .metric {
      display: grid;
      grid-template-rows: auto auto;
      align-content: center;
      row-gap: 2px;
      padding: 6px 8px;
      min-height: 38px;
      background: #ffffff;
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark),
        inset -2px -2px var(--win-mid),
        inset 2px 2px var(--win-black);
    }

    .status-box.hud-summary .metric-label {
      font-size: 10px;
      letter-spacing: 0.3px;
      color: #4a4a4a;
      text-transform: none;
      opacity: 1;
      line-height: 1.1;
    }

    .status-box.hud-summary .metric-value {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.15;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .layout {
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 4px;
      padding: 4px;
    }

    .board-stage {
      padding: 0;
      overflow: auto;
    }

    .win95-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 248px;
      grid-template-rows: minmax(0, 1fr);
      gap: 4px;
      min-height: 100%;
      height: 100%;
      padding: 4px;
      background: var(--win-face);
      align-items: stretch;
      align-content: stretch;
    }

    .win95-status,
    .win95-main {
      min-width: 0;
      min-height: 0;
      display: grid;
      gap: 4px;
      padding: 5px;
      background: var(--win-face);
      box-shadow:
        inset -1px -1px var(--win-black),
        inset 1px 1px var(--win-light),
        inset -2px -2px var(--win-dark),
        inset 2px 2px var(--win-mid);
    }

    .win95-status,
    .win95-main {
      overflow: visible;
      align-content: start;
    }

    .side-panel {
      overflow: auto;
    }

    .win95-main {
      grid-column: 1;
      grid-row: 1;
      /* Use flex-column so children flow naturally; scene-block grows.
         Was: grid-template-rows: auto auto minmax(260px, 1fr) — the 1fr row
         caught the suggested-header (a one-line label) and inflated it. */
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .win95-main > .scene-block {
      flex: 1 1 auto;
      min-height: 260px;
    }

    .win95-status {
      grid-column: 2;
      grid-row: 1;
    }

    .board-route-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 4px;
      align-items: start;
    }

    .win95-panel-title,
    .dest-header,
    .scene-title {
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      padding: 4px 6px;
      box-shadow:
        inset -1px -1px rgba(0, 0, 0, 0.25),
        inset 1px 1px rgba(255, 255, 255, 0.25);
    }

    .win95-panel-title {
      background: linear-gradient(90deg, #0b7d7d, #23b9a6);
    }

    .ledger-stack {
      display: grid;
      gap: 4px;
    }

    .ledger-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 6px 7px;
      background: #101010;
      color: #24f224;
      border: 2px solid #2a2a2a;
      font-weight: 700;
      line-height: 1.15;
    }

    .ledger-row strong {
      font-size: 16px;
      font-weight: 700;
    }

    .ledger-row.debt {
      color: #ff5c48;
    }

    .ledger-row.plain {
      color: #ffe55b;
    }

    .ledger-row.bank {
      color: #7bffed;
    }

    .win95-note,
    .win95-strip,
    .destination-block,
    .scene-copy,
    .scene-hint,
    .scene-chip {
      background: #ffffff;
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark),
        inset -2px -2px var(--win-mid),
        inset 2px 2px var(--win-black);
    }

    .win95-note,
    .scene-copy,
    .scene-hint,
    .scene-chip {
      padding: 7px;
      font-size: 11px;
      line-height: 1.35;
    }

    .win95-note {
      display: grid;
      gap: 3px;
    }

    .win95-note strong,
    .scene-chip strong {
      font-size: 11px;
    }

    .inventory-block {
      display: grid;
      gap: 4px;
      margin-top: 2px;
    }

    .inv-line {
      display: grid;
      gap: 3px;
      padding: 7px;
      font-size: 11px;
      line-height: 1.35;
      background: #ffffff;
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark),
        inset -2px -2px var(--win-mid),
        inset 2px 2px var(--win-black);
    }

    .inv-line strong {
      font-size: 11px;
    }

    .inv-wear {
      height: 7px;
      margin-top: 2px;
      background: #c0c0c0;
      box-shadow: inset 1px 1px var(--win-black), inset -1px -1px var(--win-light);
    }

    .inv-wear-fill {
      height: 100%;
      background: linear-gradient(90deg, #0b7d7d, #23b9a6);
    }

    .inv-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .inv-chip {
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 700;
      color: #08311f;
      background: #6cf0b0;
      box-shadow:
        inset -1px -1px rgba(0, 0, 0, 0.3),
        inset 1px 1px rgba(255, 255, 255, 0.6);
    }

    .inv-empty {
      font-size: 10px;
      color: #707070;
    }

    .unlock-list {
      display: grid;
      gap: 5px;
      padding: 7px;
      background: #ffffff;
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark),
        inset -2px -2px var(--win-mid),
        inset 2px 2px var(--win-black);
    }

    .unlock-row {
      display: grid;
      gap: 3px;
      font-size: 11px;
      line-height: 1.3;
    }

    .unlock-row.done .unlock-row-head { color: #0b7d3a; }
    .unlock-row.done .unlock-fill { background: linear-gradient(90deg, #0b7d3a, #6cf0b0); }

    .unlock-row-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 600;
    }

    .unlock-bar {
      height: 7px;
      background: #c0c0c0;
      box-shadow: inset 1px 1px var(--win-black), inset -1px -1px var(--win-light);
    }

    .unlock-fill {
      height: 100%;
      background: linear-gradient(90deg, #2a4ba0, #5f95c8);
      transition: width 0.25s ease;
    }

    .project-tiles {
      display: grid;
      gap: 5px;
    }
    .project-tile {
      display: grid;
      gap: 4px;
      padding: 7px;
      text-align: start;
      background: #ffffff;
      cursor: pointer;
      color: inherit;
      box-shadow:
        inset -1px -1px var(--win-light),
        inset 1px 1px var(--win-dark),
        inset -2px -2px var(--win-mid),
        inset 2px 2px var(--win-black);
    }
    .project-tile.focused {
      background: #fff8d6;
    }
    .project-tile-head {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .project-tile-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
      font-size: 10px;
